const geojsonData = {"type": "FeatureCollection", "features": [{"type": "Feature", "geometry": {"type": "Point", "coordinates": [-75.9909, 10.2415]}, "properties": {"nombre": "Galeón San José", "objetivo": "Estudiar, gestionar y proteger el area arqueologica del naufragio del galeon San Jose (hundido en 1708 cerca de Cartagena de Indias durante la Batalla de Baru), declarado patrimonio cultural sumergido de Colombia. La investigacion busca confirmar la identidad del pecio mediante recuperacion de piezas (canon, porcelana, monedas macuquinas) y analisis arqueometricos en laboratorio, documentar el sitio con tecnologia acustica de aguas profundas (ROV, batimetria multihaz), analizar fuentes historicas sobre las circunstancias del hundimiento (incluyendo una nueva hipotesis sobre problemas estructurales como causa del naufragio), y formular el primer Plan de Manejo Arqueologico (PMA) para un contexto de patrimonio cultural sumergido en Colombia.(ICANH 2025)", "resumen": "El Galeon San Jose es el hallazgo arqueologico subacuatico mas significativo en aguas colombianas y el caso emblematico del patrimonio cultural sumergido (PCS) de Colombia. Fue un navio de guerra espanol de la Flota de Indias que se hundio el 8 de junio de 1708 durante un combate naval contra la escuadra inglesa del comodoro Charles Wager frente a las costas de Cartagena de Indias. El pecio fue localizado en diciembre de 2015 por el Gobierno colombiano, ubicado a los 76 00' 20'' W, 10 13' 33'' N, a aproximadamente 50 km de la playa y a 600 metros de profundidad.\n\nDesde 2015, se han realizado cuatro campanas de prospeccion no invasiva del naufragio en el Caribe colombiano, proporcionando informacion valiosa sobre la antiguedad y procedencia de los artefactos encontrados en el lecho marino. El Plan de Manejo Arqueologico (PMA) del Galeon San Jose, publicado en 2025, es el primero desarrollado en aguas maritimas del pais y constituye una herramienta fundamental para la proteccion, gestion, investigacion y valoracion de este contexto arqueologico excepcional.\n\nEl galeon ha sido objeto de una prolongada disputa juridica que involucra a Colombia, Espana y la empresa Sea Search Armada (SSA), esta ultima por un dominio concedido por la Corte Suprema en 2007 sobre el 50% del tesoro. Borrero (2025) plantea que la excavacion total es la opcion menos deseable y sostiene que debe prevalecer la nocion de contexto arqueologico, y que la telepresencia incrementa las posibilidades de colaboracion academica y disfrute publico.", "temporalidad": "Colonial", "metodos": "Cuatro campanas de prospeccion no invasiva del naufragio (desde 2015)\nTecnicas roboticas de ultima generacion para la exploracion a 600 m de profundidad\nAnalisis numismatico, arqueologico e historico de monedas de oro registradas en el contexto subacuatico\nInvestigacion historica y documental (sistema de Flotas de Indias, historia del tipo de nave \"galeon\")\nArqueologias indigenas aplicadas a naufragios y sus contextos asociados (sitios terrestres, costeros y subacuaticos)\nAproximaciones interdisciplinarias: perspectiva de paisajes culturales maritimos\nTelepresencia para colaboracion academica internacional\nFormulacion del Plan de Manejo Arqueologico (PMA) del area arqueologica protegida", "entidades": "ICANH (Instituto Colombiano de Antropologia e Historia)\nMinisterio de las Artes, la Cultura, los Saberes y los Conocimientos (Minculturas)\nArmada Nacional de la Republica de Colombia (ARC)\nDireccion General Maritima (DIMAR)\nUniversidad Externado de Colombia (grupo de Carlos Del Cairo Hurtado)", "responsables": "Alhena Caicedo Fernandez y Luis Filipe Vieira de Castro: autores/coordinadores del Plan de Manejo Arqueologico (PMA, 2025)\nCarlos Del Cairo Hurtado: investigacion de arqueologia maritima indigena y paisajes culturales del Galeon San Jose\nJesus Alberto Aldana Mendoza: coinvestigador en campanas de prospeccion y analisis numismatico\nDaniela Vargas Ariza, Antonio Jaramillo Arango, Juan David Sarmiento Rodriguez: analisis de las monedas de oro (cobs) del contexto arqueologico, publicado en Antiquity (2025)\nRicardo Borrero: contextualizacion historica y analisis de riesgos y alternativas a la extraccion (2025)\nDiomedes Izquierdo Mejia, Juliana Quintero Hernandez, Laura Victoria Baez Santos, Carlos Andres Reina Martinez: coinvestigadores del enfoque de arqueologias indigenas maritimas", "conservacion": "Plan de Manejo Arqueologico (PMA): Publicado en 2025 por ICANH, Minculturas, ARC y DIMAR, es el primer PMA desarrollado en aguas maritimas de Colombia. Es un plan tecnico para la investigacion y proteccion del patrimonio, y un instrumento para comprender su relevancia y los retos de su gestion sostenible, para la construccion de memoria, identidad y futuro.\n\nPreservacion in situ como opcion preferible: Borrero (2025) argumenta que la excavacion total es la opcion menos deseable y que debe prevalecer la nocion de contexto arqueologico. Propone la telepresencia como alternativa que incrementa las posibilidades de colaboracion academica, cooperacion internacional y disfrute publico del hallazgo.\n\nCampanas no invasivas: Las cuatro campanas realizadas desde 2015 han sido estrictamente no invasivas, priorizando la documentacion y el registro sin alterar el contexto.\n\nMarco legal: Ley 1675 de 2013 sobre patrimonio cultural sumergido, sancionada por el presidente Juan Manuel Santos para proteger y regular la proteccion del PCS. La Corte Suprema de Justicia (sentencia de 2007) resolvio dar proteccion al patrimonio cultural, historico, artistico y arqueologico de Colombia.\n\nDisputa juridica: Existe una controversia sobre la inmunidad soberana de los buques de Estado hundidos, con Espana reclamando derechos sobre el galeon. Barbaran (2016) concluye sobre la necesidad de colaboracion entre Colombia y España.", "bibliografia": "ICAN, Minculturas, Armada Nacional de Colombia, DIMAR, Vieira de Castro, L. F., & Caicedo Fernandez, A. (2025). Plan de manejo del area arqueologica protegida del contexto Galeon San Jose: patrimonio cultural sumergido de Colombia. ICANH. https://doi.org/10.22380/9786287774155\n\nVargas Ariza, D., Jaramillo Arango, A., Aldana Mendoza, J. A., Del Cairo Hurtado, C., & Sarmiento Rodriguez, J. D. (2025). The cobs in the archaeological context of the San Jose Galleon shipwreck. Antiquity. https://doi.org/10.15184/aqy.2025.10095\n\nDel Cairo Hurtado, C., Izquierdo Mejia, D., Aldana Mendoza, J., Quintero Hernandez, J., Sarmiento Rodriguez, J. D., Baez Santos, L. V., & Reina Martinez, C. A. (2026). Integrating indigenous perspectives for the study of the maritime cultural landscapes in the Colombian Caribbean: an ancestral approach to the nautical space of the San Jose Galleon. Frontiers in Environmental Archaeology. https://doi.org/10.3389/fearc.2025.1704457\n\nBorrero, R. (2025). El Galeon San Jose: contextualizacion historica, riesgos y alternativas a la extraccion del hallazgo arqueologico mas significativo en aguas colombianas. Maguare, 39(1). https://doi.org/10.15446/mag.v39n1.118066\n\nCarrioni, C., Casas Diaz, Y. M., & Cova Gutierrez, V. A. (2024). Patrimonio cultural sumergido en Colombia: el galeon San Jose. Ensayos sobre Estrategia Maritima. https://doi.org/10.25062/2500-4735.4884\n\nBarbaran, J. (2016). Hallazgo del Galeon \"San Jose\": Los ultimos de Cartagena.\n\nRaboso Pantoja, E. (2018). El galeon San Jose: la batalla juridica.\n\nBuitrago Rojas, A. P., & Gomez Agudelo, G. A. (2019). La disputa por el galeon San Jose y su pecio en los marcos juridicos colombiano e interamericano. https://doi.org/10.15332/dt.inv.2019.02736\n\nZenkiewicz, M., & Wasilewski, T. (2019). The Galleon 'San Jose'. Almost four decades of legal struggles on the national and international plane. Comparative Law Review. https://doi.org/10.12775/clr.2019.012\n\nLozano, A., & Castellanos Gomez, E. F. (2019). La proteccion juridica del patrimonio cultural subacuatico: estudio de legislacion comparada con referencia al galeon San Jose.\n\nDel Cairo Hurtado, C., Leon Rincon, H. A., Caicedo Fernandez, A., et al. (2025). Sinergias para el desarrollo de la investigacion del patrimonio cultural subacuatico en Colombia. Revista PH, (115). https://doi.org/10.33349/2025.115.5904\n\nLastra Mier, R. (2021). Patrimonio cultural sumergido PCS en Colombia. Referentes historico legislativos. Boletin Cientifico CIOH, 40(1). https://doi.org/10.26640/22159045.2021.564", "color": "#e74c3c"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-81.45273, 12.40281]}, "properties": {"nombre": "Cayo Bolívar (Sitio Lampa / San-Tiago)", "objetivo": "Estudiar los patrones de navegabilidad, accidentalidad y hundimiento en las islas y cayos del Archipielago de San Andres, Providencia y Santa Catalina (incluidos Cayo Bolivar y Cayos del Este Sudeste), para comprender la complejidad de los yacimientos subacuaticos en esta zona insular del Caribe colombiano y contribuir al registro e inventario del patrimonio cultural sumergido alli depositado.", "resumen": "Las investigaciones en islas Cayos del Este Sudeste han permitido caracterizar el paisaje cultural marítimo de la región, identificando patrones de navegabilidad, accidentalidad y hundimiento. Aunque se rastreó documentalmente el vapor Energía (buque de carga de metal, construido en 1883 y naufragado en 1918), las fuentes confirman que aún no se han hallado evidencias arqueológicas de esta embarcación.\nNo obstante, la expedición de 2022 logró la localización y documentación de dos yacimientos significativos:\nSitio Lampa: Estructura de hierro de aproximadamente 70 m de eslora, asociada probablemente a la fragata ARC Almirante Padilla, la cual fue dinamitada en la zona en 1964.\nSitio San-Thiago: Contexto de una embarcación a vapor (aprox. 50 m de eslora) de finales del siglo XIX o principios del XX. Presenta elementos diagnósticos como calderas, propela, timón, cabrestante y anclas.", "temporalidad": "Prehispanico-Colonial", "metodos": "La aproximación científica se basó en un modelo interdisciplinario y coparticipativo ejecutado en varias fases:\nInvestigación Documental: Análisis de archivos nacionales e internacionales y cartografía histórica (donde el área aparece como \"ESE Keys\" desde finales del siglo XVIII).\nArqueología Coparticipativa: Integración del conocimiento empírico de pescadores y capitanes locales como eje constitutivo de la investigación para localizar anomalías.\nProspección Geofísica: Uso de sensores remotos, específicamente una ecosonda SideImaging DualBeam, adecuada para aguas someras y barreras coralinas.\nProcesamiento de Datos: Análisis de datos crudos (Raw-Data) mediante el software ReefMaster para confirmar anomalías de interés arqueológico.\nCaracterización Visual: Verificación in situ mediante careteo, buceo científico SCUBA y registro fotográfico y fílmico subacuático.", "entidades": "El proyecto se desarrolló bajo una red de cooperación interinstitucional coordinada por la Comisión Colombiana del Océano (CCO). Las entidades participantes incluyeron:\nDirección General Marítima (Dimar) y el Centro de Investigaciones Oceanográficas e Hidrográficas (CIOH).\nArmada Nacional de Colombia (ARC) y el Departamento de Buceo y Salvamento (Debusa).\nUniversidad Nacional de Colombia (Sede Caribe).\nFundaciones civiles como Colombia Anfibia y Terrafirme.", "responsables": "Carlos del Cairo Hurtado, Jesús Alberto Aldana Mendoza, Maritza Moreno Calderón, Laura Victoria Báez Santos, Johann Cuta Jiménez, Gina Lorena Hernández Zárate, Carla Riera Andreu, Alexandra Chadid Santamaría y Linda Lucía Ballestas Torres. Se destaca la labor como coinvestigadores de los capitanes locales Peter Betancur (\"Lampa\") y Santiago Arango (\"Tiago\").", "conservacion": "Documentación no invasiva: Se privilegia el registro visual y fotogramétrico sobre la remoción de materiales para evitar riesgos de deterioro acelerado.\nVigilancia y Monitoreo: Se propone establecer un diálogo con el puesto de control militar en Cayo Bolívar y la Capitanía de Puerto de San Andrés para que el personal esté al tanto de la existencia de los yacimientos y ayude a prevenir el expolio o saqueo.\nApropiación Social: Realización de talleres con la comunidad local y estudiantes para transformar la noción de \"tesoro\" en patrimonio colectivo, fortaleciendo las capacidades locales para la protección de los sitios.", "bibliografia": "Del Cairo, C., Aldana, J., Moreno, M., Báez, L., Cuta, J., Hernández, G., Riera, C., Chadid, A., & Ballestas, L. (2025). Aproximación a los patrones de navegabilidad, accidentalidad y hundimiento en islas Cayos del Este Sudeste: aportes para el inventario del patrimonio cultural sumergido del archipiélago de San Andrés, Providencia y Santa Catalina (Colombia). Boletín Científico CIOH, 44(1), 5-18. https://doi.org/10.26640/22159045.2025.627.\nDel Cairo, C., Aldana, J., Báez, V., López, A., Cuta, J., Hernández, G., Ballestas, L., Moreno, M., Chadid, A., & Escobar, G. (2023). La gestión e investigación del patrimonio cultural subacuático en el Caribe colombiano (2001-2023). Jangwa Pana, 22(2), 1-21. https://doi.org/10.21676/16574923.5143.\nPiazzini, C. E. (2023). Progresividad y regresividad en el tratamiento del patrimonio arqueológico subacuático en Colombia. Arqueología y Patrimonio, (3), 128-155.\nRobinson, G., & Wall, D. (s. f.). Energía. Tyne Built Ships. http://www.tynebuiltships.co.uk/E-Ships/energia1883.html.", "color": "#3498db"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-81.468, 12.398]}, "properties": {"nombre": "Bergantín Wolverine", "objetivo": "Identificar y documentar los restos del bergantin britanico Wolverine, una de las embarcaciones perdidas durante el ataque ingles de 1741 a Cartagena de Indias, como parte de la investigacion arqueologica del campo de batalla maritimo de 1741 en la bahia. La investigacion se enmarca en el estudio de los naufragios vinculados al asedio comandado por el almirante Vernon contra la defensa de Blas de Lezo, buscando localizar e identificar los pecios mediante analisis de documentos historicos y cartografia de la batalla, complementados con prospeccion acustica (batimetria multihaz) y caracterizacion del lecho marino.", "resumen": "El Bergantín Wolverine (o Wolverine) es un yacimiento arqueológico de la época republicana, identificado mediante rastreo documental y cartográfico. Se trataba de un bergantín balandra de 428 toneladas y dimensiones de 101 x 32 ½ pies, construido originalmente en 1836. Su naufragio ocurrió el 11 de agosto de 1855 en la zona sureste del Courtown Bank (actualmente islas Cayos del Este Sudeste o Cayo Bolívar), a 160 millas de Greytown. En el momento del siniestro, la nave estaba bajo el mando del comandante John Corbett y, según los registros navales, toda la tripulación logró salvarse. El sitio se asocia a un patrón de alta accidentalidad en el flanco sur del atolón, derivado de riesgos geográficos y condiciones ambientales adversas para la navegación histórica", "temporalidad": "Republicano", "metodos": "Análisis de Fuentes Documentales y Cartográficas: Recopilación de información en archivos internacionales (como el Maritime Archaeological Sea Trust y registros de la Royal Navy) para determinar las variables del hundimiento, rutas y toponimia.\nAnálisis de Patrones de Accidentalidad: Uso de modelos interdisciplinarios para cruzar datos históricos con variables oceanográficas e hidrográficas del Caribe colombiano.\nInvestigación Coparticipativa: Diálogo con comunidades de pescadores locales para identificar zonas de riesgo y posibles anomalías que coincidan con los relatos de naufragios históricos en el sector sureste.", "entidades": "Comisión Colombiana del Océano (CCO) (en el marco de la Expedición Seaflower).\nDirección General Marítima (Dimar) y el Centro de Investigaciones Oceanográficas e Hidrográficas (CIOH).\nArmada Nacional de Colombia (ARC) y el Departamento de Buceo y Salvamento (Debusa).\nUniversidad Nacional de Colombia (Sede Caribe).\nFundación Colombia Anfibia.", "responsables": "Carlos del Cairo Hurtado y Jesús Alberto Aldana Mendoza.\nMaritza Moreno Calderón, Laura Victoria Báez Santos y Johann Cuta Jiménez.\nCarla Riera Andreu (Especialista en conservación y arqueología).", "conservacion": "Registro e Inventario: Inclusión del yacimiento en el Registro Nacional de Patrimonio Cultural Sumergido para garantizar su reconocimiento legal como Bien de Interés Cultural.\nProtección Integral y No Intrusividad: Priorización del estudio de los restos sin intervención física (excavación) para evitar la pérdida de información por procesos de deterioro acelerado.\nVigilancia Comunitaria e Institucional: Propuesta de diálogo con el puesto de control militar en Cayo Bolívar y la Capitanía de Puerto de San Andrés para monitorear el área y prevenir actividades ilícitas de saqueo o expolio.", "bibliografia": "Colledge, J. J., & Warlow, B. (2010). Ships of the Royal Navy: The complete record of all fighting ships of the Royal Navy from the 15th century to the present. Casemate Publishers.\nDel Cairo, C., Aldana, J., Moreno, M., Báez, L., Cuta, J., Hernández, G., Riera, C., Chadid, A., & Ballestas, L. (2025). Aproximación a los patrones de navegabilidad, accidentalidad y hundimiento en islas Cayos del Este Sudeste: aportes para el inventario del patrimonio cultural sumergido del archipiélago de San Andrés, Providencia y Santa Catalina (Colombia). Boletín Científico CIOH, 44(1), 5-18.\nMaritime Archaeological Sea Trust. (2017). Royal Navy Loss List Complete Database. http://www.thisismast.org/assets/downloads/rn-loss-list-2017-10-29.pdf.", "color": "#f39c12"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-81.71, 12.55]}, "properties": {"nombre": "Vapor Energía", "objetivo": "Este pecio aparece únicamente dentro del inventario nacional de patrimonio cultural sumergido (PCS) gestionado por el ICANH y la DIMAR. Su objetivo de investigación se enmarca en el programa general de localización, registro, documentación e inventario del PCS colombiano mediante prospección remota (batimetría, sonar, magnetometría), investigación archivística y aplicación de los protocolos de la Ley 1675 de 2013, con el fin de garantizar su protección in situ.(Hurtado 2025).", "resumen": "El Vapor Energía es un naufragio histórico reportado en las aguas del Caribe colombiano cuya localización física aún no se ha materializado, por lo que su estudio actual se centra en la fase de prospección y rastreo documental. El Energía era una embarcación de carga de metal construida en 1883 por la Tyne Iron Shipbuilding Company en Inglaterra. Según registros históricos, el buque naufragó en 1918 en los Cayos Courtown, conocidos actualmente como islas Cayos del Este Sudeste (Cayo Bolívar), a 25 km al sureste de San Andrés. A pesar de los esfuerzos, las fuentes confirman que aún no se han encontrado evidencias arqueológicas directas de esta embarcación en el fondo marino.", "temporalidad": "Republicano", "metodos": "Investigación Documental y Cartográfica: Análisis de archivos nacionales e internacionales, prensa histórica y registros especializados como Tyne Built Ships para determinar variables del hundimiento y rutas de navegación.\nFuentes Orales y Arqueología Coparticipativa: Diálogo con pescadores y capitanes locales para identificar zonas de accidentalidad basadas en el conocimiento tradicional.\nProspección Geofísica (Sensores Remotos): Durante la Expedición Seaflower 2022, se utilizó una ecosonda SideImaging DualBeam para mapear el lecho marino en áreas de baja profundidad donde las barreras coralinas impiden el uso de sonares de arrastre.\nProcesamiento de Datos: Uso de software especializado (ReefMaster) para analizar los datos crudos (Raw-Data) en busca de anomalías que pudieran corresponder al casco del vapor.\nVerificación Visual: Inmersiones mediante careteo y buceo científico para inspeccionar anomalías detectadas, aunque en el caso del Energía no han arrojado resultados positivos hasta ahora.", "entidades": "Comisión Colombiana del Océano (CCO): Coordinadora de la Expedición Científica Seaflower.\nDirección General Marítima (Dimar) y el CIOH: Responsables de la capacidad técnica, hidrografía y sensores remotos.\nArmada Nacional de Colombia (ARC) y Departamento de Buceo y Salvamento (Debusa): Apoyo logístico y seguridad en las operaciones.\nUniversidad Nacional de Colombia (Sede Caribe): Participación académica y talleres de fortalecimiento local.\nFundaciones Especializadas: Fundación Colombia Anfibia, Fundación Terrafirme y Fundación Apalaanchi", "responsables": "Carlos del Cairo Hurtado (Arqueólogo y líder de investigación).\nJesús Alberto Aldana Mendoza (Especialista en software y análisis arqueológico).\nMaritza Moreno Calderón y Laura Victoria Báez Santos (Dimar / Fundación Colombia Anfibia).\nJohann Cuta Jiménez y Gina Lorena Hernández Zárate (Dimar).\nCarla Riera Andreu (Conservadora y arqueóloga).\nAlexandra Chadid Santamaría y Linda Lucía Ballestas Torres.", "conservacion": "como no existe evidencia material. No se han usado métodos para su conservación y preservación", "bibliografia": "Del Cairo, C., Aldana, J., Moreno, M., Báez, L., Cuta, J., Hernández, G., Riera, C., Chadid, A., & Ballestas, L. (2025). Aproximación a los patrones de navegabilidad, accidentalidad y hundimiento en islas Cayos del Este Sudeste: aportes para el inventario del patrimonio cultural sumergido del archipiélago de San Andrés, Providencia y Santa Catalina (Colombia). Boletín Científico CIOH, 44(1), 5–18. https://doi.org/10.26640/22159045.2025.627.\nDel Cairo, C., Moreno, M., Aldana, J., Báez, V., Hernández, G., Cuta, J., Ballestas, L., Riera, C., Arango, S., Betancur, P., Chadid, A., López, A., & Rubio, C. (2024a). Aproximación al inventario del Patrimonio Cultural Sumergido en islas Cayos del Este Sudeste (Archipiélago de San Andrés y Providencia, Colombia). Armada Nacional de Colombia (ARC) - Dirección General Marítima (Dimar).\nRobinson, G., & Wall, D. (s. f.). Energía. Tyne Built Ships. Consultado el 13 de mayo de 2023, en http://www.tynebuiltships.co.uk/E-Ships/energia1883.html.", "color": "#f39c12"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-80.055, 13.5333]}, "properties": {"nombre": "Cayo Roncador - USS Kearsarge", "objetivo": "Examinar los desafios legales para preservar buques militares hundidos como patrimonio cultural subacuatico en Colombia, tomando como caso de estudio el pecio del USS Kearsarge (naufragado en 1894 en Cayo Roncador), y proponer marcos de reconocimiento juridico para este tipo de embarcaciones que actualmente carecen de proteccion bajo la Ley 1675 de 2013.", "resumen": "El USS Kearsarge fue un Sloop of War (corbeta de guerra) de la Armada de los Estados Unidos, considerado el buque mas famoso y glorioso de la Guerra Civil estadounidense tras hundir al CSS Alabama en 1864 frente a las costas de Francia. Representaba innovaciones tecnologicas de la segunda mitad del siglo XIX, combinando propulsion a vapor y velas. El 2 de febrero de 1894, el USS Kearsarge encallo en Cayo Roncador, uno de los islotes del Archipielago de San Andres, Providencia y Santa Catalina (Colombia), y fue abandonado con su armamento a bordo (siete canones).\n\nColombia alberga cientos de naufragios historicos, pero la investigacion sistematica es escasa. El archipielago, por sus complejas condiciones ambientales, funciona como una \"trampa de barcos\" (ship trap). La ubicacion exacta del sitio del naufragio del Kearsarge permanece incierta. El buque es considerado patrimonio naval importante, y se encuentra en aguas territoriales colombianas pero protegido por la Sunken Military Craft Act de 2004 (SMCA) de los Estados Unidos, lo que genera desafios juridicos unicos.", "temporalidad": "Republicano", "metodos": "Analisis de registros historicos del consejo de guerra (court-martial records), bitacora de navegacion (logbook), testimonios y material nautico\nAnalisis de factores socioculturales y condiciones ambientales que causaron el accidente\nRegistros cartograficos historicos\nOrtofotografias\nImagenes satelitales Landsat\nDatos LiDAR (Light Detection and Ranging)\nFotogrametria para estimacion del sitio del naufragio\nAnalisis de la artilleria naval americana del siglo XIX en el registro arqueologico caribeno\nRevision de legislacion nacional e internacional sobre patrimonio cultural subacuatico y buques militares hundidos\nInvestigacion interdisciplinaria de arqueologia maritima y subacuatica del archipielago", "entidades": "DIMAR / CIOH (Direccion General Maritima / Centro de Investigaciones Oceanograficas e Hidrograficas del Caribe) - William Gomez Pretel es investigador vinculado\nMokpo National Maritime Museum / Korea Maritime and Ocean University (Corea del Sur) - Moonsoo Jeong como coinvestigador internacional\nUniversidad Externado de Colombia (investigaciones de PCS en el archipielago)\nGobierno de los Estados Unidos (proteccion bajo la SMCA 2004)", "responsables": "William Gomez Pretel: investigador principal de todos los estudios especificos sobre el USS Kearsarge. Es autor de cuatro articulos academicos sobre el tema (2020, 2023a, 2023b, 2024)\nMoonsoo Jeong (Korea Maritime and Ocean University): coinvestigador principal\nA. Carvajal Diaz: coinvestigador en el estudio de teledeteccion y fotogrametria\nCamilo Ernesto Rodriguez-Gutierrez y Agustin Ortiz Jr.: coinvestigadores en el estudio juridico\nE. Farrell: coinvestigador en el estudio sobre artilleria naval americana", "conservacion": "Desafios legales: Gomez Pretel et al. (2023) identifican desafios legales significativos para preservar buques militares hundidos como patrimonio cultural subacuatico en Colombia, incluyendo la falta de reconocimiento legal de los buques militares hundidos bajo la legislacion domestica (Ley 1675 de 2013) y la limitada cooperacion internacional.\n\nProteccion bajo la SMCA: El USS Kearsarge esta protegido por la Sunken Military Craft Act de 2004 de los Estados Unidos, lo que plantea cuestiones de inmunidad soberana y jurisdiccion en aguas colombianas.\n\nLocalizacion del sitio: Gomez Pretel et al. (2023) combinaron datos historicos, de teledeteccion y fotogrametria para estimar la ubicacion del sitio del naufragio, paso fundamental para cualquier estrategia de conservacion in situ.\n\nArtilleria como patrimonio: El buque fue abandonado con siete canones a bordo, lo que representa evidencia arqueologica de la introduccion de artilleria naval americana en el Caribe durante el periodo moderno tardio.\n\nContexto del archipielago: Del Cairo Hurtado et al. (2025) han avanzado en el inventario y caracterizacion de los recursos culturales subacuaticos del archipielago, incluyendo los Cayos del Este Sudeste, con enfoque en la gestion y proteccion del PCS.", "bibliografia": "Gomez Pretel, W., & Jeong, M. (2020). Shipwreck in the Caribbean Sea: Analysis in the loss of the U.S.S. Kearsarge-Roncador Cay, Colombia (1894). Journal of Marine and Island Cultures, 9(2). https://doi.org/10.21463/jmic.2020.09.2.02\n\nGomez Pretel, W., Carvajal Diaz, A., & Jeong, M. (2023). Combining historical, remote-sensing, and photogrammetric data to estimate the wreck site of the USS Kearsarge. Heritage, 6(3), 2281-2301. https://doi.org/10.3390/heritage6030122\n\nGomez Pretel, W., Jeong, M., Rodriguez-Gutierrez, C. E., & Ortiz, A., Jr. (2023). Preserving sunken military vessels as Underwater Cultural Heritage in Colombia: Legal challenges and prospects for the USS Kearsarge wreck site. Heritage, 6(6), 4896-4916. https://doi.org/10.3390/heritage6060258\n\nGomez Pretel, W., & Farrell, E. (2024). The introduction of American naval ordnance in the Caribbean Sea in the late modern period: Operational dimensions and American expansion. Mariner's Mirror. https://doi.org/10.1080/00253359.2024.2371198\n\nDel Cairo Hurtado, C., Aldana Mendoza, J. A., Moreno Calderon, M., Baez, V., Cuta Jimenez, J., Hernandez Zarate, G., Riera Andreu, C., Chadid Santamaria, A., & Ballestas Torres, L. (2025). Aproximacion a los patrones de navegabilidad, accidentalidad y hundimiento en islas Cayos del Este Sudeste. Boletin Cientifico CIOH, 43(1). https://doi.org/10.26640/22159045.2025.627\n\nDel Cairo Hurtado, C., Leon Rincon, H. A., Caicedo Fernandez, A., et al. (2025). Sinergias para el desarrollo de la investigacion del patrimonio cultural subacuatico en Colombia. Revista PH, (115). https://doi.org/10.33349/2025.115.5904", "color": "#f39c12"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-81.367, 13.35]}, "properties": {"nombre": "Bahía de Providencia y Santa Catalina", "objetivo": "Registrar e inventariar los yacimientos de patrimonio cultural sumergido en las aguas de la bahia de Providencia y Santa Catalina, como parte de la investigacion interdisciplinaria de arqueologia maritima y subacuatica en el Archipielago de San Andres, Providencia y Santa Catalina. La investigacion se centra especificamente en la porcion insular del Caribe colombiano, analizando los patrones historicos de navegabilidad, accidentalidad y hundimiento en las islas y cayos del archipielago para identificar zonas con potencial de naufragios y evidencias subacuaticas, en un area que habia recibido menor atencion investigativa frente a la porcion continental.", "resumen": "Providencia y Santa Catalina han sido primordiales para la comunicacion y la navegacion entre los diferentes territorios del Caribe y la costa colombiana. A traves de los siglos, la integracion de actores culturales y naturales ha contribuido a la creacion de un Paisaje Cultural Maritimo, donde se diluyen los limites entre la tierra y el mar por medio de las dinamicas sociales, politicas, religiosas, militares, belicas, economicas, comerciales y tecnologicas que se pueden observar tanto en los sitios arqueologicos como en la actualidad.\n\nEl proyecto principal dedicado a este sitio es la \"Expedicion Seaflower\", subtitulado \"Aproximacion al Paisaje Cultural Maritimo de Providencia y Santa Catalina\", cuyos resultados preliminares fueron publicados en el Boletin Cientifico del CIOH en 2021. Las islas forman parte del Archipielago de San Andres, Providencia y Santa Catalina, que por sus complejas condiciones ambientales constituye una \"trampa de barcos\" (ship trap), con cientos de naufragios historicos. La barrera arrecifal de barlovento de Providencia es uno de los arrecifes mas significativos del hemisferio occidental y podria ser la segunda barrera mas grande del Caribe.\n\nEl archipielago ha sido escenario de investigacion arqueologica maritima y subacuatica en expansion. Del Cairo Hurtado et al. (2025) senalan que en el archipielago se han propuesto aproximaciones cientificas interesadas en inventariar y caracterizar recursos culturales subacuaticos que pueden aportar informacion historica y cultural valiosa.", "temporalidad": "Colonial-Republicano", "metodos": "Aproximacion al Paisaje Cultural Maritimo como marco conceptual integrador (Expedicion Seaflower)\nInventario y caracterizacion de recursos culturales subacuaticos en el archipielago\nAnalisis de patrones de navegabilidad, accidentalidad y hundimiento como propuesta para el registro del PCS\nInvestigacion historica y cartografica (fuentes coloniales, registros de navegacion)\nDocumentacion de sitios arqueologicos terrestres y subacuaticos\nEstudio de las dinamicas sociales, politicas, religiosas, militares, belicas, economicas, comerciales y tecnologicas asociadas al paisaje maritimo\nDocumentacion etnografica de la tradicion de construccion y uso de embarcaciones de madera (catboats, lanchs y canoas) por parte de los islenos raizales", "entidades": "Universidad Externado de Colombia - Carlos Del Cairo Hurtado y equipo (marco general de investigacion del PCS en el Caribe colombiano y el archipielago)\nDIMAR / CIOH (Centro de Investigaciones Oceanograficas e Hidrograficas del Caribe) - publicacion de resultados y plataforma institucional para la Expedicion Seaflower\nICANH (Instituto Colombiano de Antropologia e Historia) - marco institucional de gestion del PCS\nFundacion Terra Firme - diagnostico sobre capacidades tecnicas y academicas para el estudio del PCS en Colombia", "responsables": "Maritza Moreno Calderon y Laura Victoria Baez Santos: autoras del articulo sobre la Expedicion Seaflower y el paisaje cultural maritimo de Providencia y Santa Catalina (2021)\nCarlos Del Cairo Hurtado: lider del equipo amplio de investigacion del PCS en el Caribe colombiano, incluyendo el Archipielago de San Andres, Providencia y Santa Catalina (2023, 2025)\nAdriana Perez: investigadora de las culturas migratorias y la tradicion de construccion de embarcaciones de madera en Providencia y Santa Catalina (2014)", "conservacion": "Reserva de la Biosfera Seaflower: Las islas de Old Providence y Santa Catalina estan incluidas dentro de la Reserva de la Biosfera Seaflower, lo que proporciona un marco internacional de proteccion para su patrimonio natural y cultural.\n\nInventario de recursos culturales subacuaticos: Las investigaciones en el archipielago han avanzado en la identificacion e inventario de recursos culturales sumergidos, paso fundamental para cualquier estrategia de conservacion.\n\nGestion sostenible del PCS: Jaramillo Machuca, Socarras y Del Cairo Hurtado (2015) abordan la gestion sostenible y viabilidad para el estudio y proteccion del Patrimonio Cultural Sumergido en Colombia, incluyendo el diagnostico de las capacidades tecnicas y academicas del pais.\n\nRegistro del patrimonio inmaterial maritimo: Perez (2014) documento la tradicion de construccion y uso de catboats, lanchs y canoas por los islenos raizales de Providencia y Santa Catalina, practica que forma parte del patrimonio cultural inmaterial vinculado al paisaje maritimo de las islas.\n\nMarco normativo: El PCS en Colombia se rige por la legislacion que considera las especies naufragas como bienes con valor cultural, historico, artistico y arqueologico, en consonancia con la Convencion de la UNESCO de 2001.", "bibliografia": "Moreno Calderon, M., & Baez Santos, L. V. (2021). Expedicion Seaflower: el paisaje cultural maritimo de Providencia y Santa Catalina. Resultados preliminares. Boletin Cientifico CIOH, 40(1), 83-90. https://doi.org/10.26640/22159045.2021.566\n\nDel Cairo Hurtado, C., Aldana Mendoza, J. A., Moreno Calderon, M., Baez, V., Cuta Jimenez, J., Hernandez Zarate, G., Riera Andreu, C., Chadid Santamaria, A., & Ballestas Torres, L. (2025). Aproximacion a los patrones de navegabilidad, accidentalidad y hundimiento en islas Cayos del Este Sudeste. Boletin Cientifico CIOH, 43(1). https://doi.org/10.26640/22159045.2025.627\n\nDel Cairo Hurtado, C., Baez Santos, V., Aldana Mendoza, J. A., Lopez Narvaez, A., Cuta Jimenez, J., Hernandez Zarate, G., Ballestas Torres, L., Moreno Calderon, M., Chadid Santamaria, A., & Escobar Olaya, G. A. (2023). La gestion e investigacion del patrimonio cultural subacuatico en el Caribe colombiano (2001-2023). Jangwa Pana, 22(2). https://doi.org/10.21676/16574923.5143\n\nDel Cairo Hurtado, C., Leon Rincon, H. A., Caicedo Fernandez, A., Aldana Mendoza, J. A., Chadid Santamaria, A., Quintero Hernandez, J., Escobar Olaya, G. A., Reina Martinez, C. A., & Vallejo Quintero, S. E. (2025). Sinergias para el desarrollo de la investigacion del patrimonio cultural subacuatico en Colombia. Revista PH, (115). https://doi.org/10.33349/2025.115.5904\n\nPerez, A. (2014). Catboats, lanchs and canoes: apuntes para una historia de las relaciones de las islas de Providencia y Santa Catalina con el Caribe centroamericano e insular a traves de la construccion y el uso de embarcaciones de madera. Passagens, 6(3). https://doi.org/10.5533/1984-2503-20146303\n\nJaramillo Machuca, N., Socarras, J. L., & Del Cairo Hurtado, C. (2015). Gestion sostenible y viabilidad para el estudio y proteccion del Patrimonio Cultural Sumergido.\n\nMow, J. M. (2004). The Old Providence and Santa Catalina Islands: Present and future.\n\nMier, R. L. (2021). Patrimonio cultural sumergido PCS en Colombia. Referentes historico legislativos. Boletin Cientifico CIOH, 40(1). https://doi.org/10.26640/22159045.2021.564", "color": "#2ecc71"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-74.9564116716467, 10.9655464659416]}, "properties": {"nombre": "Vapor Prinz August Wilhelm - Puerto Colombia", "objetivo": "Documentar e inventariar el pecio del vapor Prinz August Wilhelm (hundido en 1918, ~18 m de profundidad) mediante prospección batimétrica con ecosonda multihaz y sonar de barrido lateral, buceo arqueológico con registro fotográfico/videográfico, investigación archivística y aplicación de protocolos de la Nautical Archaeology Society (NAS), con el fin de generar un modelo replicable de arqueología subacuática para el Caribe colombiano.(MARTIN 2017).", "resumen": "El Prinz August Wilhelm (PAW) fue un buque de la Hamburg America Line (HAPAG), construido en 1902 en Alemania (4.733 t, 113 m), que operaba rutas entre Hamburgo, México y el Caribe. Al inicio de la Primera Guerra Mundial quedó internado en Colombia y fondeado en la bahía de Sabanilla. El 22 de abril de 1918, para evitar su confiscación por Estados Unidos, la tripulación lo hundió intencionalmente abriéndole válvulas e incendiándolo. Sus restos yacen a 1.700 metros del muelle de Puerto Colombia, entre 10 y 18 metros de profundidad, y fueron estudiados por la Universidad del Norte como caso de patrimonio subacuático amenazado.", "temporalidad": "Republicano", "metodos": "Investigación histórica y documental (archivos, cartografía histórica, fuentes primarias)\nProspección batimétrica (levantamiento del fondo marino)\nProspección geofísica marina (sonar de barrido lateral / side scan sonar, magnetometría)\nBuceo arqueológico y documentación fotográfica subacuática\nInventario y registro de evidencias materiales del pecio\nDocumentación del estado de conservación del naufragio\nAnálisis histórico de la contribución alemana al desarrollo de Barranquilla y Puerto Colombia", "entidades": "Universidad del Norte (Barranquilla) – a través del Grupo de Investigación Memorias del Caribe\nFundación Apalaanchi – apoyo en la investigación subacuática\nBathymetric Solutions S.A.S. – levantamientos batimétricos y geofísicos\nFundación Puerto Colombia – gestión patrimonial y difusión\nMuseo Mapuka (Universidad del Norte) – exhibición de piezas recuperadas", "responsables": "El proyecto arqueológico fue liderado por Juan Guillermo Martín y José Manuel Espinosa, ambos de la Universidad del Norte, con la participación de Eduardo Roa (Fundación Apalaanchi) y Elías Blanco y Julián Blanco (Bathymetric Solutions S.A.S.).\n\nLa investigación histórica fue adelantada previamente por los barranquilleros Enrique Yidi Daccarett y Álvaro Mendoza Arango, quienes publicaron el libro De la gloria al olvido (2014), obra fundamental sobre la historia del buque.", "conservacion": "Inventario y documentación del pecio como modelo replicable para otros yacimientos del Caribe colombiano, buscando llenar los vacíos en la protección del patrimonio subacuático.\nRecuperación de artefactos del naufragio (piezas metálicas, elementos de la embarcación), que fueron trasladados al Museo Mapuka de la Universidad del Norte en Barranquilla para su conservación ex situ y exhibición.\nDifusión y sensibilización mediante exposiciones museográficas y publicaciones académicas e históricas, para generar apropiación social del patrimonio.\nRegistro del estado de deterioro del yacimiento, documentando las amenazas que enfrenta (dinámicas oceánicas, expolio, sedimentación del río Magdalena) como base para futuras estrategias de protección.\nAbogacía normativa: el proyecto evidenció la necesidad de revisar la legislación colombiana, que no reconocía como sitio arqueológico los naufragios con menos de 100 años de antigüedad, dejando desprotegido al PAW.", "bibliografia": "Martín, J. G., Espinosa, J. M., Roa, E., Blanco, E., & Blanco, J. (2017). Arqueología subacuática en Puerto Colombia. Avances sobre el vapor Prinz August Wilhelm. Arqueología Iberoamericana, 36, 60–65. http://purl.org/aia/369\n\nYidi Daccarett, E., & Mendoza Arango, Á. (2014). De la gloria al olvido: El hundimiento del vapor Prinz August Wilhelm en Puerto Colombia, 1918. [Libro].\n\nRausch, J. M. (2016). [Reseña de De la gloria al olvido: El hundimiento del vapor Prinz August Wilhelm en Puerto Colombia, 1918, por E. Yidi Daccarett y Á. Mendoza Arango]. Hispanic American Historical Review, 96(1), 175–177. https://doi.org/10.1215/00182168-3424132\n\nDel Cairo Hurtado, C., León Rincón, H. A., Caicedo Fernández, A., Aldana Mendoza, J. A., Chadid Santamaría, A., Quintero Hernández, J., Escobar Olaya, G. A., Reina Martínez, C. A., & Vallejo Quintero, S. E. (2025). Sinergias para el desarrollo de la investigación del patrimonio cultural subacuático en Colombia. Revista PH, 115. https://doi.org/10.33349/2025.115.5904\n\nDel Cairo Hurtado, C., Baez Santos, V., Aldana Mendoza, J. A., López Narváez, A., Cuta Jiménez, J., Hernández Zárate, G., Ballestas Torres, L., Moreno Calderón, M., Chadid Santamaría, A., & Escobar Olaya, G. A. (2023). La gestión e investigación del patrimonio cultural subacuático en el Caribe colombiano (2001-2023). Jangwa Pana, 22(2). https://doi.org/10.21676/16574923.5143\n\nMartín, J. G., & Espinosa, J. M. (2013). Arqueología en el fondo del mar. Universidad del Norte.", "color": "#f39c12"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-74.19, 11.267]}, "properties": {"nombre": "Bahía de Taganga", "objetivo": "Documentar como se ha transformado la relacion entre los pescadores de Taganga y la bahia a lo largo del tiempo, usando un enfoque etno-arqueologico que cruza testimonios orales de la comunidad con evidencias materiales del paisaje costero y submarino, para reconocer el valor patrimonial de ese vinculo historico entre el pueblo y el mar.", "resumen": "La Bahia de Taganga, ubicada en el departamento de Magdalena (Santa Marta), constituye un sitio de interes para el estudio del patrimonio cultural maritimo y subacuatico en Colombia. El trabajo principal sobre este sitio es un analisis etno-arqueologico de las transformaciones del paisaje cultural maritimo de la bahia, desarrollado como trabajo de grado en Antropologia de la Universidad del Magdalena en 2018 y publicado en el Boletin Cientifico del CIOH en 2021.\n\nLa investigacion se propuso problematizar y exponer un acercamiento a la nocion del paisaje cultural maritimo en la localidad de Taganga. Se abordaron los procesos de cambio y transformacion operados en tres momentos historicos: prehispanico, colonial y republicano. Se escogio el poblado de Taganga por ser un asentamiento con una larga tradicion de relacion con el mar.\n\nComplementariamente, Londono Diaz (2025) publico el libro The Argonauts of West Caribbean, que recoge investigaciones arqueologicas sobre la cultura de navegacion en la region y datos etnograficos de los carpinteros ribereños de Taganga, abordando la tradicion de manufactura de canoas en la costa de la Sierra Nevada de Santa Marta.", "temporalidad": "Colonial", "metodos": "Metodologia mixta que involucro tres componentes integrados:\nTrabajo etnografico (entrevistas, observacion participante con comunidades de pescadores)\nTrabajo arqueologico (registro y analisis de evidencias materiales)\nSustento documental (fuentes historicas primarias y secundarias)\nAnalisis de tres periodos historicos: prehispanico, colonial y republicano\nInvestigacion etnografica sobre la tradicion de carpinteria naval ribereña y manufactura de canoas\nMarco conceptual de paisajes culturales maritimos aplicado al contexto local", "entidades": "Universidad del Magdalena - sede del programa de Antropologia donde se desarrollo la investigacion como trabajo de grado\nDIMAR / CIOH (Centro de Investigaciones Oceanograficas e Hidrograficas del Caribe) - publicacion del articulo en el Boletin Cientifico CIOH", "responsables": "Luis Carlos Alvarez Ochoa: investigador principal, autor del analisis etno-arqueologico de las transformaciones del paisaje cultural maritimo de la Bahia de Taganga (trabajo de grado, Universidad del Magdalena, 2018; publicado 2021)\nWilhelm Londono Diaz: autor del libro The Argonauts of West Caribbean (2025), con investigacion arqueologica y etnografica sobre la tradicion de navegacion y carpinteria de canoas en Taganga\n", "conservacion": "Documentacion del paisaje cultural maritimo: El trabajo de Alvarez Ochoa (2021) constituye un aporte a la documentacion y valoracion del paisaje cultural maritimo de Taganga, lo cual es un paso fundamental para su proteccion y gestion. Al abordar las transformaciones en tres periodos historicos, permite identificar los procesos de cambio que amenazan la integridad del patrimonio.\n\nRegistro de patrimonio inmaterial maritimo: Londono Diaz (2025) registro la tradicion de carpinteria ribereña de Taganga, que constituye patrimonio cultural inmaterial vinculado al paisaje maritimo. Esta documentacion contribuye a la preservacion de conocimientos ancestrales sobre navegacion y construccion naval artesanal.\n\nMarco de gestion nacional del PCS: Del Cairo Hurtado et al. (2023) situan a Taganga dentro del panorama de gestion e investigacion del patrimonio cultural subacuatico en el Caribe colombiano (2001-2023), reconociendo el alto potencial de bienes del PCS en los espacios maritimos del pais.\n\nApertura al publico de yacimientos subacuaticos: Del Cairo Hurtado et al. (2025) abordan la discusion sobre si se deben abrir los yacimientos arqueologicos subacuaticos para su visita, lo cual incluye consideraciones aplicables a sitios como Taganga donde el patrimonio cultural esta directamente vinculado al mar y la comunidad.", "bibliografia": "Alvarez Ochoa, L. C. (2021). Analisis etno-arqueologico de las transformaciones del paisaje cultural maritimo de la Bahia de Taganga. Boletin Cientifico CIOH, 40(1), 3-8. https://doi.org/10.26640/22159045.2021.557\n\nLondono Diaz, W. (2025). The argonauts of West Caribbean. Universidad del Magdalena. https://doi.org/10.21676/9789587468083\n\nDel Cairo Hurtado, C., Baez Santos, V., Aldana Mendoza, J. A., Lopez Narvaez, A., Cuta Jimenez, J., Hernandez Zarate, G., Ballestas Torres, L., Moreno Calderon, M., Chadid Santamaria, A., & Escobar Olaya, G. A. (2023). La gestion e investigacion del patrimonio cultural subacuatico en el Caribe colombiano (2001-2023). Jangwa Pana, 22(2). https://doi.org/10.21676/16574923.5143\n\nDel Cairo Hurtado, C., Lopez Narvaez, A., Aldana Mendoza, J. A., Leon Rincon, H. A., Caicedo Fernandez, A., & Reina Martinez, C. A. (2025). Sumergido pero no olvidado: herencias culturales bajo el mar en Colombia y su potencial apertura al publico. Revista PH, (115). https://doi.org/10.33349/2025.115.5833\n\nDel Cairo Hurtado, C., Leon Rincon, H. A., Caicedo Fernandez, A., Aldana Mendoza, J. A., Chadid Santamaria, A., Quintero Hernandez, J., Escobar Olaya, G. A., Reina Martinez, C. A., & Vallejo Quintero, S. E. (2025). Sinergias para el desarrollo de la investigacion del patrimonio cultural subacuatico en Colombia. Revista PH, (115). https://doi.org/10.33349/2025.115.5904", "color": "#e74c3c"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-77.05171, 8.16521]}, "properties": {"nombre": "Santa María la Antigua del Darién", "objetivo": "Localizar el antiguo puerto español de la ciudad mediante prospeccion subacuatica en Bahia La Gloria, para confirmar o descartar la hipotesis de que alli se ubicaba el embarcadero colonial. Complementariamente, en tierra se realizo prospeccion arqueologica sistematica (pozos de sondeo, imagenes satelitales, analisis de suelos), excavaciones estratigraficas en area (campanas 2013-2017) y analisis arqueometricos de materiales ceramicos, con el fin de identificar y delimitar tanto el sitio colonial como los asentamientos prehispanicos.(Martin 2015, Sarcina 2017)", "resumen": "Santa María de la Antigua del Darién fue la primera ciudad española en Tierra Firme, fundada en 1510 por Martín Fernández de Enciso y Vasco Núñez de Balboa en la costa occidental del golfo de Urabá (actual Chocó, Colombia). Capital de Castilla del Oro hasta el traslado a Panamá, fue abandonada progresivamente y quemada por indígenas en 1524, desapareciendo bajo la selva.\nDesde 2013, el ICANH desarrolló un proyecto arqueológico de seis años que identificó y delimitó el área colonial y un asentamiento prehispánico del pueblo Cueva sobre el que fue construida. Las excavaciones revelaron pisos, patios empedrados, calles, un taller de herrería y cerámica indígena y europea, confirmando dos núcleos: el poblado indígena ocupado en 1510 y la ciudad fundada en 1514 por Pedro Arias de Ávila. La ciudad llegó a albergar unos 5.000 habitantes y contaba con catedral, hospital, plaza, Casa de la Contratación, monasterio de San Francisco y cárcel.", "temporalidad": "Colonial", "metodos": "Prospeccion arqueologica sistematica por pozos de sondeo\nExcavacion estratigrafica en area (metodo estratigrafico riguroso)\nImagenes satelitales cruzadas con evidencia arqueologica\nAnalisis de suelos\nInvestigaciones subacuaticas (en Bahia La Gloria, buscando el antiguo puerto)\nAnalisis de paleohidrografia (estudio de cauces de agua antiguos)\nAnalisis arqueometrico de ceramica (manufactura indigena y extranjera)\nAnalisis especializados de materiales arqueologicos\nTecnologias aplicadas al patrimonio\nInvestigacion de fuentes historicas y etnohistoricas", "entidades": "Instituto Colombiano de Antropologia e Historia (ICANH): entidad ejecutora principal, inicio el Plan de Manejo y Proteccion en 2013\nMinisterio de Cultura de Colombia: financiador y promotor del proyecto\n", "responsables": "El investigador principal fue Alberto Sarcina, arqueologo de la Universidad La Sapienza de Roma, Ph.D. en Arqueologia por la Universidad de Leiden (Paises Bajos), investigador del ICANH y especialista en arqueologia estratigrafica. Sarcina dirigio las investigaciones desde 2013 hasta al menos 2020, publicando los resultados principales.\n\nOtros investigadores que participaron:\n\nJuan Guillermo Martin y Jose Manuel Espinosa (investigaciones subacuaticas en Bahia La Gloria)\nCarolina Quintero (museologia del Parque Arqueologico, investigacion urbanistica historica)\nPaolo Vignolo (difusion editorial del proyecto)", "conservacion": "Plan de Manejo y Proteccion del sitio arqueologico: iniciado por el ICANH en 2013, con el objetivo de identificar, delimitar y proteger el area de la ciudad\nCreacion del Museo Arqueologico e Historico de Santa Maria de la Antigua del Darien: espacio para exhibicion, difusion y apropiacion social del patrimonio\nCreacion del Parque Arqueologico e Historico de Santa Maria de la Antigua del Darien: para la puesta en valor y visita publica del sitio\nProyecto editorial \"Historias del Darien\": serie de publicaciones para la difusion del trabajo arqueologico y la reconstruccion historica comunitaria\nTrabajo comunitario: integracion de las comunidades locales en la investigacion, reconstruccion de memorias y conocimientos de los habitantes de la region\nAgrupacion \"Museologia Comunitaria del Darien\": estrategia de participacion comunitaria en la gestion del patrimonio", "bibliografia": "NULLSarcina, A. (2020). De la gloria al olvido: estudio arqueologico de la primera ciudad espa\ffffffffb1ola en la Tierra Firme de America: Santa Maria de la Antigua del Darien. ICANH.\n\nSarcina, A. (2018). Santa Maria de la Antigua y Darien. Las dos caras de la primera ciudad europea en tierra firme. Indiana, 35(2), 243-269. https://doi.org/10.18441/IND.V35I2.243-269\n\nSarcina, A. (2017). Santa Maria de la Antigua del Darien, la primera ciudad espa\ffffffffb1ola en Tierra Firme: una prospeccion arqueologica sistematica. Revista Colombiana de Antropologia, 53(1). https://doi.org/10.22380/2539472X.11\n\nMartin, J. G., Espinosa, J. M., & Sarcina, A. (2015). ?El primer puerto espa\ffffffffb1ol en Tierra Firme? Arqueologia en Bahia La Gloria, Colombia.\n\nSarcina, A., & Quintero, C. (2018). Las cuatro vidas de Darien. El museo arqueologico e historico de Santa Maria de La Antigua del Darien. ICANH. https://doi.org/10.22380/9789588852607\n\nQuintero Agamez, C., & Sarcina, A. (2022). Calles y casas de Santa Maria de la Antigua del Darien. Fronteras de la Historia, 27(1), 12-42. https://doi.org/10.22380/20274688.1536\n\nSarcina, A., Quintero, C., & Vignolo, P. (2022). Historias del Darien. La ciudad colonial. ICANH. https://doi.org/10.22380/9786287512283\n\nGallego, A. (2011). Santa Maria de la Antigua del Darien: un enclave espa\ffffffffb1ol en el Darien colombiano del siglo XVI.", "color": "#e74c3c"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-72.908, 11.544]}, "properties": {"nombre": "Riohacha - Media Guajira", "objetivo": "Proponer una metodologia para el registro del patrimonio cultural sumergido en la peninsula de la Guajira, mediante el analisis de patrones de navegabilidad, accidentalidad y hundimiento a partir del cruce de fuentes archivisticas coloniales, cartografia nautica historica y bases de datos de siniestralidad maritima, complementado con prospeccion remota (batimetria, magnetometria, sonar de barrido lateral), como paso previo a la localizacion e inventario sistematico de yacimientos subacuaticos en la zona.(Hurtado 2024).", "resumen": "La peninsula de la Guajira colombiana tiene un importante potencial de patrimonio cultural sumergido vinculado a la navegacion colonial y a la explotacion perlera del siglo XVI. La fuente mas relevante es el articulo de Del Cairo Hurtado et al. (2024), que propone una metodologia para el registro del patrimonio cultural sumergido especificamente en Cartagena de Indias y la peninsula de la Guajira, incluyendo las fases de localizacion, registro, documentacion e inventario de patrimonios maritimos.\n\nAdemas, la pesca de perlas en La Guajira fue la principal fuente de ingresos para los colonos espanoles en el siglo XVI. Se fundaron numerosos asentamientos temporales denominados \"Rancherias de Perlas\" que eventualmente dieron paso a asentamientos permanentes, incluyendo Riohacha. Existe una carencia de informacion arqueologica sobre estos yacimientos.", "temporalidad": "Colonial-Republicano", "metodos": "Revision de fuentes de informacion historicas y documentales\nAnalisis de patrones de navegabilidad historica\nAnalisis de patrones de accidentalidad y hundimiento\nLocalizacion, registro, documentacion e inventario de patrimonios maritimos\nFormulacion de propuestas metodologicas para la gestion y proteccion desde un primer acercamiento Construccion de la memoria geohistorica de la region\nAnalisis arqueologico del funcionamiento de los yacimientos", "entidades": "Universidad Externado de Colombia (grupo de investigacion liderado por Carlos Del Cairo Hurtado)\nICANH (Instituto Colombiano de Antropologia e Historia)\nDIMAR / CIOH (Direccion General Maritima / Centro de Investigaciones Oceanograficas e Hidrograficas)", "responsables": "El proyecto de registro del PCS en Cartagena y la peninsula de la Guajira fue liderado por Carlos Del Cairo Hurtado, junto con Carla Riera Andreu, Laura Victoria Baez Santos, Andrea Chavez Trivino, Gabriela Caro Leon y Jesus Alberto Aldana Mendoza.\n\nEl estudio sobre las Rancherias de Perlas fue realizado por Ligia Paulina Maya Puerta.", "conservacion": "Formulacion de propuestas metodologicas de gestion y proteccion como primer acercamiento\nInstrumentos interinstitucionales para la proteccion del PCS contra el expolio y trafico ilegal\nArticulacion entre actores publicos (seguridad y defensa), operadores juridicos, entidades de gestion cultural e investigadores\nMarco legal: Ley 1675 de 2013 sobre patrimonio cultural sumergid", "bibliografia": "Del Cairo Hurtado, C., Riera Andreu, C., Baez Santos, L. V., Chavez Trivino, A., Caro Leon, G., & Aldana Mendoza, J. A. (2024). Patrones de navegabilidad, accidentalidad y hundimiento en el caribe colombiano: una propuesta para el registro del patrimonio cultural sumergido en Cartagena de Indias y la peninsula de la Guajira. Arqueologia y Patrimonio. https://doi.org/10.22380/26652773.2758\n\nMaya Puerta, L. P. (2019). La configuracion arqueologica de las Rancherias de Perlas en La Guajira Colombiana (s. XVI): estado de la cuestion y perspectivas arqueologicas. Revista Atlantica-Mediterranea de Prehistoria y Arqueologia Social, 21. https://doi.org/10.25267/rev_atl-mediterr_prehist_arqueol_soc.2019.v21.07\n\nDel Cairo Hurtado, C., Baez Santos, V., Aldana Mendoza, J. A., Lopez Narvaez, A., Cuta Jimenez, J., Hernandez Zarate, G., Ballestas Torres, L., Moreno Calderon, M., Chadid Santamaria, A., & Escobar Olaya, G. A. (2023). La gestion e investigacion del patrimonio cultural subacuatico en el Caribe colombiano (2001-2023). Jangwa Pana, 22(2). https://doi.org/10.21676/16574923.5143\n\nLopez, Y. (2021). Instrumentos interinstitucionales para la proteccion del patrimonio cultural sumergido (PCS): propuesta de circular externa conjunta frente a actividades ilicitas contra el PCS. Boletin Cientifico CIOH, 40(1). https://doi.org/10.26640/22159045.2021.565\n\nLastra Mier, R. (2021). Patrimonio cultural sumergido PCS en Colombia. Referentes historico legislativos. Boletin Cientifico CIOH, 40(1). https://doi.org/10.26640/22159045.2021.564", "color": "#2ecc71"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-75.5810215637755, 10.3191963534222]}, "properties": {"nombre": "Canal de Bocachica - Pecio San Felipe", "objetivo": "Estudiar y gestionar el yacimiento arqueologico del canal de Bocachica asociado al navio San Felipe, hundido en 1741 como parte de la estrategia defensiva espanola durante el asedio ingles a Cartagena de Indias, para confirmar su identidad mediante evidencia arqueologica y comprender los procesos belicos, naturales y antropicos que configuraron este contexto patrimonial.", "resumen": "El pecio San Felipe es un naufragio localizado en el Canal de Bocachica, Cartagena de Indias, durante las labores de dragado del canal de navegacion de la ciudad. Segun las fuentes historicas, el navio San Felipe fue uno de los buques espanoles hundidos como parte de la estrategia defensiva durante el asedio ingles de 1741 comandado por el almirante Edward Vernon. El asedio estuvo marcado por diferentes planteamientos estrategicos y tacticos que resultaron en la perdida de distintos componentes ofensivos ingleses y defensivos espanoles. El tiempo y las dinamicas naturales y antropicas modelaron los rastros del acontecimiento, dando lugar a diversos yacimientos arqueologicos costeros y subacuaticos.\n\nEl articulo clave sobre este sitio, titulado \"Sacrificios de Guerra\", se centra especificamente en el estudio y la gestion del posible navio San Felipe en Cartagena de Indias.", "temporalidad": "Colonial", "metodos": "Investigacion en fuentes historicas y documentales sobre el asedio de 1741\nAnalisis cartografico colonial de Bocachica (siglos XVII y XVIII), disolviendo las dicotomias naturaleza-cultura y tierra-mar para caracterizar el territorio\nProspeccion y registro arqueologico subacuatico durante las labores de dragado del canal de navegacion\nPropuesta de indicadores arqueologicos para la identificacion de naufragios coloniales en la bahia (origen geoespacial y temporal de la nave)\nAnalisis de procesos de formacion de contextos arqueologicos sumergidos\nPatrones de navegabilidad, accidentalidad y hundimiento como marco de registro del PCS", "entidades": "Universidad Externado de Colombia - Carlos Del Cairo Hurtado y equipo\nICANH (Instituto Colombiano de Antropologia e Historia)\nDIMAR / CIOH (publicacion en Boletin Cientifico CIOH)\nQuien estuvo al frente", "responsables": "Carlos Del Cairo Hurtado: investigador principal, autor del articulo \"Sacrificios de Guerra\" (2024) y de la aproximacion arqueologica a la cartografia colonial de Bocachica (2014)\nCarla Riera Andreu: coinvestigadora\nJesus Alberto Aldana Mendoza: coinvestigador\nLaura Victoria Baez Santos: coinvestigadora", "conservacion": "Amenaza del dragado: El pecio San Felipe fue localizado durante las labores de dragado del canal de navegacion, lo que representa la principal amenaza directa para su conservacion. Las obras de infraestructura portuaria pueden destruir el contexto arqueologico.\n\nGestion del sitio: El articulo \"Sacrificios de Guerra\" esta orientado especificamente \"hacia el estudio y la gestion\" del posible navio San Felipe, lo que indica que se proponen medidas de gestion para este sitio concreto.\n\nCartografia como herramienta de proteccion: Del Cairo Hurtado (2014) utilizo la cartografia colonial de Bocachica como herramienta para comprender y proteger el espacio donde yacen los naufragios, aplicando la topologia de la guerra para construir representaciones del puerto durante la Colonia.", "bibliografia": "Del Cairo Hurtado, C., Riera Andreu, C., Aldana Mendoza, J. A., & Baez Santos, L. V. (2024). Sacrificios de Guerra: hacia el estudio y la gestion del posible navio San Felipe (1741) en Cartagena de Indias (Colombia). Anales de Antropologia, 58(2). https://doi.org/10.22201/iia.24486221e.2024.58.2.86916\n\nDel Cairo Hurtado, C. (2014). Mentiras verdaderas o la topologia de la guerra. Aproximacion arqueologica a la cartografia colonial de Bocachica, Cartagena de Indias. Apuntes, 26(1). https://doi.org/10.11144/JAVERIANA.APC26-1.MVTG\n\nDel Cairo Hurtado, C., & Aldana Mendoza, J. A. (2021). Propuesta de indicadores arqueologicos para la identificacion de naufragios coloniales en la bahia Cartagena de Indias. Boletin Cientifico CIOH, 40(1). https://doi.org/10.26640/22159045.2021.563\n\nSegovia Salas, R. (1981). Las defensas de la canal de Bocachica.\n\nDesnaux, C. S. de (1870). Diario de lo acaecido en la invasion hecha por los ingleses a la plaza de Cartagena de Indias desde 13 de marzo de 1741, hasta 20 de mayo del mismo año.", "color": "#e74c3c"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-75.5811808262123, 10.3197183128958]}, "properties": {"nombre": "Canal de Bocachica - Castillo de San Luis", "objetivo": "Documentar las estructuras sumergidas y semisumergidas del Castillo de San Luis de Bocachica, fortificacion colonial destruida durante el asedio ingles de 1741, para analizar su papel dentro del sistema defensivo de Cartagena de Indias y evaluar el impacto de los procesos belicos, la erosion costera y la dinamica marina sobre sus restos, como parte del registro integral del patrimonio cultural subacuatico de la bahia.", "resumen": "El Canal de Bocachica es un área de alta densidad arqueológica debido a su papel estratégico en la defensa de Cartagena de Indias. En este sector se localizan los restos del Castillo de San Luis, una fortificación colonial cuyos cimientos fueron identificados hacia el suroriente del corregimiento de Bocachica, lugar donde se concentró el ataque inglés durante el asedio de 1741. El yacimiento se caracteriza por ser un contexto asociativo que integra restos arquitectónicos, cerámica, municiones y objetos de la vida cotidiana que se encuentran tanto en tierra como sumergidos. Vinculado espacialmente a este paisaje defensivo, se encuentra un pecio colonial identificado mediante estudios científicos como el posible navío de línea San Felipe", "temporalidad": "Colonial", "metodos": "Investigación Intrusiva: Se han realizado múltiples temporadas de excavación arqueológica sistemática (2015-2019) para estudiar la estructura del pecio y recuperar materiales diagnósticos.\nMatriz de Indicadores: Para la identificación del naufragio se diseñó una matriz que cruza fuentes históricas (cartografía antigua, planos de arquitectura naval y grabados) con los correlatos culturales hallados en el fondo marino.\nArqueología Coparticipativa: Se integró activamente a la comunidad de Bocachica, permitiendo que los habitantes locales participaran en las labores de estudio y formación profesional.\nSensores Remotos y Cartografía: Superposición de cartografía histórica sobre el lecho marino para localizar anomalías y elementos estructurales identificados durante labores de dragado.", "entidades": "Fundación Terrafirme.\nInstituto Colombiano de Antropología e Historia (ICANH).\nDirección General Marítima (Dimar) y el Centro de Investigaciones Oceanográficas e Hidrográficas (CIOH).\nInstituto Nacional de Vías (Invías).\nUniversidad Externado de Colombia.", "responsables": "Carlos del Cairo Hurtado (Arqueólogo).\nJesús Alberto Aldana Mendoza (Investigador principal del caso San Felipe).\nCarla Riera Andreu (Conservadora y arqueóloga)", "conservacion": "Estabilización de materiales: Procesos para garantizar la integridad química y física de los objetos recuperados.\nProtección In Situ: Recubrimiento de las unidades de excavación con geotextil y costales de arena para evitar el deterioro por corrientes o sedimentación.\nInfraestructura de Conservación: Creación de una propuesta para un laboratorio de PCS en el Fuerte San Fernando de Bocachica, destinado a la preservación de los hallazgos del canaNULL", "bibliografia": "Aldana, J. (2019). Propuesta metodológica para la construcción de una matriz de indicadores arqueológicos e históricos para la identificación de naufragios: El caso de un navío colonial ubicado en el canal de Bocachica (Cartagena de Indias) [Tesis de Pregrado]. Universidad Externado de Colombia.\nDel Cairo, C. (2010). Plan Especial de Manejo y Protección del sistema conformado por el fuerte de San Fernando y sus baterías colaterales Santiago y San Juan Francisco de Regis, los vestigios del Castillo San Luis. Ministerio de Cultura de Colombia.\nDel Cairo, C., Aldana, J., Báez, V., López, A., Cuta, J., Hernández, G., Ballestas, L., Moreno, M., Chadid, A., & Escobar, G. (2023). La gestión e investigación del patrimonio cultural subacuático en el Caribe colombiano (2001-2023). Jangwa Pana, 22(2), 1-21.\nFundación Terrafirme. (2017). Investigación arqueológica y de las medidas de protección, intervención y divulgación de un pecio colonial localizado en espacios subacuáticos en la zona de Bocachica, Cartagena de Indias. ICANH; Invías.\nRiera, C. (2017). Proteger y conservar el patrimonio cultural sumergido: El pecio de Bocachica, Cartagena de Indias (Colombia). Boletín Observatorio del Patrimonio Cultural y Arqueológico, (13), 28-37.", "color": "#e74c3c"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-75.561, 10.391]}, "properties": {"nombre": "Canal de Manzanillo - Manzanillo 15", "objetivo": "Registrar y documentar los yacimientos arqueologicos subacuaticos localizados en el canal de Manzanillo (bahia de Cartagena de Indias), dentro del estudio integral del paisaje cultural maritimo y subacuatico de la bahia, para comprender los procesos de territorializacion del espacio maritimo y contribuir al inventario nacional de patrimonio cultural sumergido en zonas de alta densidad de evidencias arqueologicas asociadas a la actividad portuaria y naval colonial.", "resumen": "El sitio Manzanillo 15 se ubica en el Canal de Manzanillo, en la Bahia de Cartagena de Indias. Este sector ha sido escenario de hallazgos arqueologicos subacuaticos vinculados a naufragios coloniales, particularmente asociados al asedio ingles de 1741. Durante las labores del dragado del canal de navegacion de la ciudad se localizaron los restos de un naufragio en la zona donde, segun las fuentes historicas, se hundieron embarcaciones espanolas como parte de la defensa de Cartagena.\n\nLos yacimientos arqueologicos sumergidos vinculados a embarcaciones naufragadas presentan una gran cantidad de condicionantes para las investigaciones cientificas. Alrededor de la embarcacion, o de los restos que se preservan de ella, es posible plantear multiples preguntas relacionadas con su temporalidad, funcionalidad, origen espacial, hundimiento e identidad. Estas deben considerar el caracter dinamico de los contextos arqueologicos, los cuales, lejos de ser unidades estaticas, se ven expuestos a una gran cantidad de factores de alteracion que pueden modificar drasticamente sus caracteristicas.\n\nEl estudio del sector Manzanillo forma parte de un programa mas amplio de investigacion sobre paisajes culturales maritimos y subacuaticos de la Bahia de Cartagena, que abarca evidencias desde la epoca prehispanica hasta la actualidad.", "temporalidad": "Colonial", "metodos": "El sitio Manzanillo 15 se ubica en el Canal de Manzanillo, en la Bahia de Cartagena de Indias. Este sector ha sido escenario de hallazgos arqueologicos subacuaticos vinculados a naufragios coloniales, particularmente asociados al asedio ingles de 1741. Durante las labores del dragado del canal de navegacion de la ciudad se localizaron los restos de un naufragio en la zona donde, segun las fuentes historicas, se hundieron embarcaciones espanolas como parte de la defensa de Cartagena.\n\nLos yacimientos arqueologicos sumergidos vinculados a embarcaciones naufragadas presentan una gran cantidad de condicionantes para las investigaciones cientificas. Alrededor de la embarcacion, o de los restos que se preservan de ella, es posible plantear multiples preguntas relacionadas con su temporalidad, funcionalidad, origen espacial, hundimiento e identidad. Estas deben considerar el caracter dinamico de los contextos arqueologicos, los cuales, lejos de ser unidades estaticas, se ven expuestos a una gran cantidad de factores de alteracion que pueden modificar drasticamente sus caracteristicas.\n\nEl estudio del sector Manzanillo forma parte de un programa mas amplio de investigacion sobre paisajes culturales maritimos y subacuaticos de la Bahia de Cartagena, que abarca evidencias desde la epoca prehispanica hasta la actualidad.", "entidades": "Universidad Externado de Colombia - Carlos Del Cairo Hurtado y equipo de investigacion\nICANH (Instituto Colombiano de Antropologia e Historia) - marco institucional\nDIMAR / CIOH (Direccion General Maritima / Centro de Investigaciones Oceanograficas e Hidrograficas del Caribe) - publicacion en Boletin Cientifico CIOH", "responsables": "Carlos Del Cairo Hurtado: investigador principal del proyecto de arqueologia maritima y subacuatica en la Bahia de Cartagena, incluyendo los naufragios de Bocachica y Manzanillo. Autor principal de la tesis doctoral \"Paisajes culturales maritimos y subacuaticos\" (2015) y de los articulos sobre procesos de formacion (2020), indicadores arqueologicos (2021), el posible navio San Felipe (2024) y patrones de navegabilidad (2024).\n\nCarla Riera Andreu: coinvestigadora en los estudios de procesos de formacion de Bocachica y Manzanillo (2020) y en el estudio del posible navio San Felipe (2024)\n\nJesus Alberto Aldana Mendoza: coinvestigador en indicadores arqueologicos (2021), procesos de formacion (2020) y el estudio del navio San Felipe (2024)\n\nLaura Victoria Baez Santos: coinvestigadora en procesos de formacion (2020) y en el estudio del San Felipe (2024)\n\n", "conservacion": "Amenaza directa del dragado: Las labores de dragado del canal de navegacion de Cartagena constituyen la principal amenaza para el sitio Manzanillo 15. Durante estas obras se localizaron restos del naufragio, lo que evidencia el riesgo de destruccion del contexto arqueologico por actividades portuarias e infraestructurales.\n\nEstudio de procesos de formacion: Del Cairo Hurtado et al. (2020) realizaron una aproximacion especifica a los procesos de formacion de los contextos arqueologicos sumergidos de Bocachica y Manzanillo, analizando los factores de alteracion (naturales y antropicos) que modifican los yacimientos. Este conocimiento es fundamental para disenar estrategias de conservacion in situ.\n\nMedidas de manejo y gestion: Del Cairo Hurtado et al. (2024) plantearon medidas de manejo y gestion en cada etapa de la arqueologia maritima y subacuatica, desde la localizacion hasta el inventario, aplicables al sector Manzanillo.\n\nPropuesta metodologica de proteccion: La tesis doctoral de Del Cairo Hurtado (2015) propone una metodologia para la investigacion y proteccion del PCS en la Bahia de Cartagena, incluyendo el sector de Manzanillo.", "bibliografia": "Del Cairo Hurtado, C., Riera, C., Baez Santos, L. V., & Aldana Mendoza, J. A. (2020). Arqueologia de los naufragios de Bocachica y Manzanillo: una aproximacion a los procesos de formacion de contextos arqueologicos sumergidos. Boletin Cientifico CIOH, 39(2). https://doi.org/10.26640/22159045.2020.543\n\nDel Cairo Hurtado, C., Riera Andreu, C., Aldana Mendoza, J. A., & Baez Santos, L. V. (2024). Sacrificios de Guerra: hacia el estudio y la gestion del posible navio San Felipe (1741) en Cartagena de Indias (Colombia). Anales de Antropologia, 58(2). https://doi.org/10.22201/iia.24486221e.2024.58.2.86916\n\nDel Cairo Hurtado, C., & Aldana Mendoza, J. A. (2021). Propuesta de indicadores arqueologicos para la identificacion de naufragios coloniales en la bahia Cartagena de Indias. Boletin Cientifico CIOH, 40(1). https://doi.org/10.26640/22159045.2021.563\n\nDel Cairo Hurtado, C., Riera Andreu, C., Baez Santos, L. V., Chavez Trivino, A., Caro Leon, G., & Aldana Mendoza, J. A. (2024). Patrones de navegabilidad, accidentalidad y hundimiento en el Caribe colombiano: una propuesta para el registro del patrimonio cultural sumergido en Cartagena de Indias y la peninsula de la Guajira. Arqueologia y Patrimonio. https://doi.org/10.22380/26652773.2758\n\nDel Cairo Hurtado, C. (2015). Paisajes culturales maritimos y subacuaticos. Una propuesta metodologica para la investigacion y proteccion del Patrimonio Cultural Sumergido [Tesis doctoral, Universidad Externado de Colombia].\n\nDel Cairo Hurtado, C., Leon Rincon, H. A., Caicedo Fernandez, A., et al. (2025). Sinergias para el desarrollo de la investigacion del patrimonio cultural subacuatico en Colombia. Revista PH, (115). https://doi.org/10.33349/2025.115.5904", "color": "#e74c3c"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-75.64, 10.39]}, "properties": {"nombre": "Bajo de Salmedina - Salmedina I", "objetivo": "Registrar y documentar el yacimiento arqueologico subacuatico denominado Salmedina I, localizado en el bajo de Salmedina frente a Cartagena de Indias, como parte del inventario del patrimonio cultural sumergido de la bahia. La investigacion busca identificar la naturaleza y cronologia del pecio mediante prospeccion acustica y analisis de fuentes historicas sobre naufragios en esta zona de alto riesgo para la navegacion, y evaluar su estado de conservacion frente a las dinamicas naturales del entorno.", "resumen": "El yacimiento Salmedina I constituye un hito fundacional para la disciplina en el país, siendo el escenario del primer estudio de arqueología subacuática realizado en Colombia en el año 1990. Se localiza en el Bajo de Salmedina, un sector arrecifal de importancia estratégica en la bahía de Cartagena de Indias. El sitio corresponde a un contexto de naufragio histórico cuya investigación pretendía caracterizar su naturaleza y determinar las circunstancias de su pérdida", "temporalidad": "Colonial", "metodos": "Análisis arqueológico: Orientado a comprender la naturaleza del yacimiento y el origen geocultural de la embarcación.\nInvestigación causal: Estudio de las variables que provocaron el hundimiento del navío en el sector del bajo.\nLimitaciones: Las fuentes señalan que el proyecto no pudo ser culminado, lo que resultó en que los hallazgos específicos y los datos técnicos detallados nunca fueran divulgados de manera masiva ni depositados en centros de documentación públicos", "entidades": "Universidad de los Andes.\nArmada Nacional de la República de Colombia (ARC).\nDepartamento de Buceo y Salvamento (Debusa).\nCentro de Investigaciones Oceanográficas e Hidrográficas (CIOH).\nMuseo Naval del Caribe.\nFundación de Investigaciones Arqueológicas Nacional (FIAN).", "responsables": "C. Uribe (autor de los informes de 1991 y la revisión de 2006).", "conservacion": "Debido a que el proyecto investigativo de 1990 no llegó a su etapa de culminación, las fuentes no registran protocolos específicos de conservación física aplicados sobre los restos materiales o medidas de preservación in situ documentadas. La falta de un informe final consolidado en centros de documentación ha impedido el seguimiento de las trayectorias de conservación de este yacimiento específico.", "bibliografia": "Uribe, C. (1991). Informe del programa de arqueología submarina, Salmedina I (documento inédito). Universidad de los Andes; Museo Naval del Caribe.\nUribe, C. (2006). Los inicios de la arqueología submarina en Colombia: Salmedina I. En C. Del Cairo, & C. García (Eds.), Historias sumergidas. Hacia la protección del patrimonio cultural subacuático en Latinoamérica (pp. 137-150). Universidad Externado de Colombia.\nDel Cairo, C., Aldana, J., Báez, V., López, A., Cuta, J., Hernández, G., Ballestas, L., Moreno, M., Chadid, A. y Escobar, G. (2023). La gestión e investigación del patrimonio cultural subacuático en el Caribe colombiano (2001-2023). Jangwa Pana, 22(2), 1-21", "color": "#e74c3c"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-75.5498985396129, 10.3849341372217]}, "properties": {"nombre": "Castillogrande - Navío El Conquistador", "objetivo": "Identificar y documentar los restos del navio El Conquistador, uno de los buques de guerra hundidos estrategicamente durante el asedio ingles de 1741 a Cartagena de Indias como parte de la linea defensiva ordenada por el almirante Blas de Lezo, para comprender las tacticas de defensa naval y contribuir al registro arqueologico de los yacimientos costeros y subacuaticos vinculados a la batalla en la bahia de Cartagena.", "resumen": "El navio Conquistador fue uno de los buques de guerra espanoles hundidos estrategicamente durante el asedio ingles de 1741 a Cartagena de Indias. El almirante Blas de Lezo ordeno hundir varios navios de la armada espanola para formar una linea de defensa que bloqueara el acceso a la bahia, logrando la victoria espanola contra la enorme flota del almirante Edward Vernon. El Conquistador, junto con los navios Dragon, Africa y San Carlos, fue localizado como una anomalia compatible con un naufragio en la Bahia de Cartagena, en el sector de Castillogrande/Bocachica.\n\nLa bahia de Cartagena alberga un universo de evidencias arqueologicas subacuaticas relacionadas con los procesos de territorializacion del espacio maritimo desde la epoca prehispanica hasta la actualidad. Estas evidencias incluyen los naufragios de 1741, que constituyen yacimientos arqueologicos costeros y subacuaticos vinculados a fortificaciones y embarcaciones que fueron escenario de la confrontacion.", "temporalidad": "Colonial", "metodos": "Analisis de documentos historicos y cartografia historica\nAdquisicion de datos de campo (field data) complementarios\nProspeccion subacuatica para localizacion e identificacion de anomalias\nPropuesta de indicadores arqueologicos para la identificacion de naufragios coloniales, incluyendo modelos interpretativos para sistematizar y jerarquizar categorias de analisis\nAnalisis de procesos de formacion de contextos arqueologicos sumergidos (Bocachica y Manzanillo)\nMetodologia de gestion del patrimonio cultural sumergido con cinco criterios puntuados de 1 a 5 (riesgo bajo a alto); cuando la suma supera 15, se requiere accion de gestion. Criterios: (i) condiciones ambientales, (ii) estado de conservacion, (iii) valor historico, (iv) accesibilidad, (v) amenazas antropicas\nCaracterizacion tipologica de restos ceramicos (bocas de botijas) del naufragio de Bocachica, usando metodo comparativo con referencias de Goggin y Mintz (1964) y Carter (1982)\nPatrones de navegabilidad, accidentalidad y hundimiento como marco de registro del PCS\nInvestigacion del paisaje cultural maritimo y subacuatico de la bahia\n", "entidades": "DIMAR / CIOH (Centro de Investigaciones Oceanografi
