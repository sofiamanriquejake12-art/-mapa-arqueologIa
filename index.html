cas e Hidrograficas del Caribe) - Quintana-Saavedra, Torres Parra, Guzman Martinez\nUniversidad Externado de Colombia - Carlos Del Cairo Hurtado y equipo\nUniversidad del Norte (Grupo Memorias del Caribe) - Juan Guillermo Martin y Jose Manuel Espinosa\nUniversidad de Cadiz (Espana) - G. Anfuso, J.J. Munoz-Perez (coinvestigadores internacionales)", "responsables": "D. Quintana-Saavedra, Carlos Alberto Andrade Amaya, Richard Guzman Martinez, R.T. Torres Parra y Pedro Javier Prada Rueda: autores del estudio de caracterizacion de los cuatro naufragios de 1741 (incluyendo el Conquistador), publicado en The International Hydrographic Review (2022)\n\nCarlos Del Cairo Hurtado: investigador principal de multiples estudios sobre paisajes culturales maritimos, indicadores arqueologicos y procesos de formacion de contextos sumergidos en la Bahia de Cartagena\n\nJuan Guillermo Martin y Jose Manuel Espinosa (Universidad del Norte): proyecto pionero de arqueologia subacuatica en la bahia de Cartagena, con el objetivo de identificar los naufragios del ataque de Vernon en 1741\n\nQuintana-Saavedra et al. (2023): metodologia de gestion del PCS aplicada a cuatro naufragios coloniales, dos en la bahia interior y dos en el sector Bocachica", "conservacion": "Definicion de estrategias de conservacion y preservacion: Quintana-Saavedra et al. (2022), en el estudio donde localizaron e identificaron las anomalias compatibles con el Conquistador, Dragon, Africa y San Carlos, senalan explicitamente que su estudio \"contribuye a definir estrategias de conservacion y preservacion de bienes culturales sumergidos\" (conservation and preservation strategies of submerged cultural assets), refiriendose directamente a estos cuatro naufragios.\n\nEvaluacion de riesgo del sitio: Quintana-Saavedra et al. (2023) aplicaron su metodologia de gestion directamente a cuatro naufragios coloniales en la Bahia de Cartagena, incluyendo el Conquistador. El sistema evalua cinco criterios puntuados de 1 (riesgo bajo) a 5 (riesgo alto): condiciones ambientales, estado de conservacion, valor historico, accesibilidad y amenazas antropicas. Cuando la suma supera 15, se requiere accion de gestion. Esta evaluacion fue aplicada especificamente a estos naufragios de 1741.\n\nAmenaza del dragado: Del Cairo Hurtado et al. (2024) documentan que las labores de dragado del canal de navegacion de Cartagena representan una amenaza directa para los naufragios de 1741 en la bahia, incluyendo el area donde se ubica el Conquistador. Durante estas labores se localizaron restos de otro naufragio (posible navio San Felipe).", "bibliografia": "Del Cairo Hurtado, C., Riera Andreu, C., Aldana Mendoza, J. A., & Baez Santos, L. V. (2024). Sacrificios de Guerra: hacia el estudio y la gestion del posible navio San Felipe (1741) en Cartagena de Indias (Colombia). Anales de Antropologia, 58(2). https://doi.org/10.22201/iia.24486221e.2024.58.2.86916\n\nDel Cairo Hurtado, C., & Aldana Mendoza, J. A. (2021). Propuesta de indicadores arqueologicos para la identificacion de naufragios coloniales en la bahia Cartagena de Indias. Boletin Cientifico CIOH, 40(1). https://doi.org/10.26640/22159045.2021.563\n\nDel Cairo Hurtado, C., Riera, C., Baez Santos, L. V., & Aldana Mendoza, J. A. (2020). Arqueologia de los naufragios de Bocachica y Manzanillo: una aproximacion a los procesos de formacion de contextos arqueologicos sumergidos. Boletin Cientifico CIOH, 39(2). https://doi.org/10.26640/22159045.2020.543\n\nDel Cairo Hurtado, C., Riera Andreu, C., Baez Santos, L. V., Chavez Trivino, A., Caro Leon, G., & Aldana Mendoza, J. A. (2024). Patrones de navegabilidad, accidentalidad y hundimiento en el Caribe colombiano: una propuesta para el registro del patrimonio cultural sumergido en Cartagena de Indias y la peninsula de la Guajira. Arqueologia y Patrimonio. https://doi.org/10.22380/26652773.2758\n\nDel Cairo Hurtado, C. (2015). Paisajes culturales maritimos y subacuaticos. Una propuesta metodologica para la investigacion y proteccion del Patrimonio Cultural Sumergido [Tesis doctoral, Universidad Externado de Colombia].\n\nMartin, J. G., & Espinosa, J. M. (2013). Arqueologia en el fondo del mar. Universidad del Norte.\n\nSanchez, M. (2021). Caracterizacion tipologica de restos ceramicos de botijas procedentes del naufragio de Bocachica, Cartagena de Indias. Boletin Cientifico CIOH, 40(1). https://doi.org/10.26640/22159045.2021.569\n\nDel Cairo Hurtado, C., Leon Rincon, H. A., Caicedo Fernandez, A., et al. (2025). Sinergias para el desarrollo de la investigacion del patrimonio cultural subacuatico en Colombia. Revista PH, (115). https://doi.org/10.33349/2025.115.5904", "color": "#e74c3c"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-75.568, 10.375]}, "properties": {"nombre": "Isla de Tierrabomba - Batería Chamba", "objetivo": "Registrar y documentar los vestigios sumergidos y semisumergidos de la Bateria Chamba, una posicion artillera complementaria del sistema defensivo de Cartagena de Indias ubicada en la isla de Tierrabomba. La investigacion forma parte del estudio integral del paisaje cultural maritimo y subacuatico de la bahia, combinando revision de fuentes historicas y cartografia militar colonial, prospeccion con tecnologia acustica (batimetria multihaz, sonar de barrido lateral) y registro arqueologico subacuatico, para evaluar el estado de conservacion de la estructura frente a la erosion costera y la dinamica marina, y contribuir al inventario nacional de patrimonio cultural sumergido.(Hurtado2015)", "resumen": "La Bateria de la Chamba es una de las fortificaciones menores del sistema defensivo del canal de Bocachica, en la Isla de Tierrabomba, Cartagena de Indias. Forma parte del conjunto de baterias costeras que, junto con los fuertes de San Fernando y San Jose y otras estructuras como el Angel San Rafael, conformaban la defensa del acceso sur a la Bahia de Cartagena durante el periodo colonial espanol. Este sistema defensivo fue fundamental en la guerra colonial anglo-espanola, garantizando las comunicaciones con el virreinato del Peru por el istmo de Panama. Todo el conjunto fortificado fue declarado Patrimonio Historico y Cultural de la Humanidad por la UNESCO en 1984.", "temporalidad": "Colonial", "metodos": "Analisis de cartografia colonial de los siglos XVII y XVIII (superposicion y polivalencia de cartografias)\nInvestigacion historica y documental\nAnalisis de condiciones oceano-atmosfera y variaciones morfologicas de la linea de costa\nEvaluacion patologica de vulnerabilidad sismica y efectos del oleaje (aplicado a San Jose y San Fernando)\nRegistro de grafitis historicos en las fortificaciones del canal", "entidades": "UNESCO (declaratoria Patrimonio de la Humanidad, 1984)\nMinisterio de Cultura de Colombia (proteccion del patrimonio fortificado)\nUniversidad Externado de Colombia (investigaciones arqueologicas en Bocachica, Del Cairo Hurtado)\nDIMAR / CIOH (estudios oceanograficos y de linea de costa)\nEscuela Taller de Bocachica (formacion y conservacion del patrimonio en el sector)\nQuien estuvo al frente", "responsables": "Carlos Del Cairo Hurtado (arqueologia del canal de Bocachica)\nArnoldo Berrocal Olave (estudios tecnicos de San Jose y San Fernando)\nAlberto Samudio (historiografia de las fortificaciones de Cartagena)\nRamiro Segura Salas (defensas de la canal de Bocachica)", "conservacion": "La Bateria de la Chamba se beneficia de la proteccion general que otorga la declaratoria UNESCO de 1984 al conjunto fortificado de Cartagena\nLas fortificaciones de Cartagena representan el 44% del patrimonio cultural protegido por el Ministerio de Cultura en la ciudad\nSe han propuesto lineamientos para un Plan Especial de Salvaguardia (PES) del ecosistema cultural de litoral en Bocachica, Isla de Tierrabomba\nNo se encontraron intervenciones de restauracion o conservacion documentadas especificamente para la Bateria de la Chamba", "bibliografia": "Del Cairo Hurtado, C. (2014). Mentiras verdaderas o la topologia de la guerra. Aproximacion arqueologica a la cartografia colonial de Bocachica, Cartagena de Indias. Apuntes, 26(1). https://doi.org/10.11144/JAVERIANA.APC26-1.MVTG\n\nSegura Salas, R. (1981). Las defensas de la canal de Bocachica.\n\nGomez Pretelt, W., & Diaz, A. C. (2011). Estrategia para la defensa y ubicacion de las fortificaciones de la plaza fuerte de Cartagena de Indias en el siglo XVIII. Saber, Ciencia y Libertad, 6(2). https://doi.org/10.18041/2382-3240/SABER.2011V6N2.2506\n\nMenchero Sanchez, M. (2017). Las fortificaciones de Cartagena de Indias y su funcion turistica en el turismo cultural de la ciudad. Methaodos, 5(1). https://doi.org/10.17502/m.rcs.v5i1.157\n\nArango Restrepo, D. M. (2013). Escuela taller Bocachica Cartagena de Indias. Universidad Jorge Tadeo Lozano.\n\nHiguera Gomez, S. J. (s.f.). El ecosistema cultural de litoral en Bocachica (Isla de Tierrabomba Cartagena): lineamientos basicos para la formulacion de un plan especial de salvaguardia (PES). Universidad Javeriana. https://doi.org/10.11144/javeriana.10554.14005\n\nSamudio, A. (2004). Cartagena de Indias, fortaleza del Caribe.", "color": "#e74c3c"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-75.576, 10.33]}, "properties": {"nombre": "Isla de Tierrabomba - Fuerte de Santiago", "objetivo": "Documentar y analizar las estructuras defensivas sumergidas y semisumergidas del sistema fortificado de Cartagena de Indias en el entorno de Tierrabomba, dentro del enfoque de paisajes culturales maritimos y subacuaticos propuesto por Del Cairo Hurtado. El Fuerte de Santiago forma parte del complejo defensivo colonial que protegia el acceso a la bahia por el canal de Bocachica. La investigacion integra analisis de fuentes historicas y cartografia militar del siglo XVIII, prospeccion con tecnologia acustica multihaz, y registro arqueologico subacuatico de las estructuras afectadas por la erosion costera y la dinamica marina, con el fin de comprender los procesos de territorializacion del espacio maritimo desde la epoca colonial.(Hurtado 2025).", "resumen": "La Isla de Tierrabomba, ubicada en la bahia de Cartagena de Indias, es un enclave estrategico del patrimonio cultural maritimo y subacuatico colombiano. En el sector de Bocachica se encuentran las fortificaciones coloniales (como el Fuerte de San Fernando y la Bateria de Santiago) que fueron escenario central de la defensa espanola durante el asedio ingles de 1741, liderado por el almirante Vernon contra las fuerzas del almirante Blas de Lezo.\n\nDurante esa batalla, varios navios espanoles fueron hundidos estrategicamente para formar lineas de defensa y frenar el avance de la flota inglesa, generando diversos yacimientos arqueologicos costeros y subacuaticos vinculados a fortificaciones y embarcaciones. Investigaciones recientes han localizado e identificado cuatro anomalias compatibles con los navios de guerra Conquistador, Dragon, Africa y San Carlos, hundidos en 1741. Tambien se han localizado restos de un naufragio durante labores de dragado del canal de navegacion, posiblemente vinculado al navio San Felipe.\n\nAdemas, entre Tierrabomba y la Punta de Icacos se construyo entre 1769 y 1786 un muro submarino (\"La Escollera\") de aproximadamente 3 km de longitud para cerrar la entrada de Bocagrande, obra del ingeniero militar Antonio de Arevalo", "temporalidad": "Colonial", "metodos": "Analisis de documentos historicos y cartografia colonial\nBatimetria multihaz (multibeam bathymetry)\nSonar de barrido lateral (sonar images)\nTecnologia acustica multihaz para caracterizacion de estructuras sumergidas\nProspeccion arqueologica subacuatica mediante buceo\nAproximaciones interdisciplinares a los procesos de formacion de contextos arqueologicos sumergidos\nAnalisis de imagenes satelitales y multitemporal de linea de costa\nInvestigacion de fuentes historicas coloniales\nPuesta en valor patrimonial con comunidades pesqueras locales", "entidades": "DIMAR / CIOH (Direccion General Maritima / Centro de Investigaciones Oceanograficas e Hidrograficas del Caribe)\nUniversidad Externado de Colombia (grupo de investigacion de Carlos Del Cairo Hurtado)\nICANH (Instituto Colombiano de Antropologia e Historia)\nUniversidad del Norte (Grupo Memorias del Caribe, investigaciones en la bahia)\nComunidades pesqueras de la Isla de Tierrabomba (participacion comunitaria)", "responsables": "Carlos Del Cairo Hurtado (Universidad Externado): investigacion del paisaje cultural maritimo de la Bahia de Cartagena (2011-2015), arqueologia de naufragios de Bocachica, estudio del posible navio San Felipe\nCarla Riera Andreu, Jesus Alberto Aldana Mendoza, Laura Victoria Baez Santos: coinvestigadores en los proyectos de Bocachica\nDaniel Quintana-Saavedra, Richard Guzman-Martinez, Carlos Alberto Andrade Amaya, Rafael Torres-Parra: caracterizacion de los cuatro naufragios de 1741 y estudio de La Escollera\nJuan Guillermo Martin y Jose Manuel Espinosa: arqueologia subacuatica en la bahia de Cartagena", "conservacion": "Gestion conjunta Estado-Academia-Comunidades: Del Cairo y Garcia Chaves (2010) proponen que una gestion entre el Estado, la academia y las comunidades es una estrategia viable para la proteccion del patrimonio cultural maritimo, incluyendo restos arqueologicos subacuaticos y manifestaciones culturales intangibles (pesca artesanal, navegacion, construccion naval) en comunidades pesqueras de Tierrabomba\nPlan Especial de Salvaguardia (PES): Higuera Gomez propuso lineamientos basicos para formular un PES del ecosistema cultural de litoral en Bocachica, Isla de Tierrabomba\nEstrategias de conservacion y preservacion de activos culturales sumergidos: Quintana-Saavedra et al. (2022) senalan que su estudio de los naufragios de 1741 contribuye a definir estrategias de conservacion y preservacion, un tema que Colombia debe desarrollar\nProteccion legal: Ley 1675 de 2013 sobre patrimonio cultural sumergido y los instrumentos interinstitucionales contra el expolio", "bibliografia": "Del Cairo Hurtado, C., Riera Andreu, C., Aldana Mendoza, J. A., & Baez Santos, L. V. (2024). Sacrificios de Guerra: hacia el estudio y la gestion del posible navio San Felipe (1741) en Cartagena de Indias (Colombia). Anales de Antropologia, 58(2). https://doi.org/10.22201/iia.24486221e.2024.58.2.86916\n\nQuintana-Saavedra, D., Andrade Amaya, C. A., Guzman Martinez, R., Torres Parra, R. T., & Prada Rueda, P. J. (2022). Characterization of four shipwrecks from 1741 in Cartagena Bay. The International Hydrographic Review. https://doi.org/10.58440/ihr-27-a05\n\nGuzman-Martinez, R., Quintana-Saavedra, D., & Andrade-Amaya, C. A. (2023). On the Survey of \"La Escollera\" and a Submerged Structure Related to Fort San Matias in the Bay of Cartagena de Indias. Journal of Maritime Archaeology. https://doi.org/10.1007/s11457-023-09374-3\n\nDel Cairo Hurtado, C., & Garcia Chaves, C. (2010). A la pesca de langostas y galeones: apropiacion y valoracion de los recursos culturales y naturales maritimos en comunidades pescadoras de la Isla de Tierra Bomba.\n\nDel Cairo Hurtado, C., Riera, C., Baez Santos, L. V., & Aldana Mendoza, J. A. (2020). Arqueologia de los naufragios de Bocachica y Manzanillo: una aproximacion a los procesos de formacion de contextos arqueologicos sumergidos. Boletin Cientifico CIOH, 39(2). https://doi.org/10.26640/22159045.2020.543\n\nDel Cairo Hurtado, C. (2015). Paisajes culturales maritimos y subacuaticos. Una propuesta metodologica para la investigacion y proteccion del Patrimonio Cultural Sumergido.\n\nHiguera Gomez, S. J. (s.f.). El ecosistema cultural de litoral en Bocachica (Isla de Tierrabomba Cartagena): lineamientos basicos para la formulacion de un plan especial de salvaguardia (PES). Universidad Javeriana. https://doi.org/10.11144/javeriana.10554.14005\n\nGalindo-Diaz, J., & Fontas-Serrat, J. (2026). The submerged wall of the Bocagrande canal in Cartagena de Indias, a defensive work by the military engineer Antonio de Arevalo (1769-1788). FORTMED 2026. https://doi.org/10.4995/fortmed2026.2026.21531", "color": "#e74c3c"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-75.578, 10.325]}, "properties": {"nombre": "Isla de Tierrabomba - Fuerte de San José", "objetivo": "Documentar las estructuras defensivas sumergidas y semisumergidas del Fuerte de San Jose, que junto con el Fuerte de San Fernando conformaba el sistema de defensa cruzada del canal de Bocachica para proteger el acceso a la bahia de Cartagena de Indias. La investigacion se enmarca en el estudio del paisaje cultural maritimo y subacuatico de la bahia, integrando fuentes historicas y cartografia militar del siglo XVIII, prospeccion acustica multihaz y registro arqueologico subacuatico, con el fin de analizar los procesos de erosion costera y dinamica marina que han afectado las fortificaciones y comprender su papel en la estrategia defensiva colonial contra los ataques britanicos.(Hurtado 2015).", "resumen": "La Bateria de San Jose de Bocachica es una fortificacion colonial espanola ubicada en la Isla de Tierrabomba, en el canal de Bocachica, entrada a la Bahia de Cartagena de Indias. Forma parte del sistema defensivo del canal junto con el Fuerte de San Fernando, ubicado en la orilla opuesta. La bateria ha sido objeto de multiples ataques a lo largo de su historia que han modificado su estado y funcionalidad. Cartagena de Indias y su sistema de fortificaciones fueron declarados Patrimonio Historico y Cultural de la Humanidad por la UNESCO en 1984, lo que confiere gran importancia a la conservacion de estos monumentos.\n\nLa bateria se enmarca en el contexto de la defensa de la canal de Bocachica, que fue el punto estrategico para controlar el acceso a la bahia de Cartagena. Las fortificaciones y murallas de este sector fueron el soporte de la presencia hispanica en el Caribe sur y garantizaban las comunicaciones con el virreinato del Peru por el istmo de Panama. El canal de Bocachica fue escenario de batallas maritimas, y la cartografia colonial de los siglos XVII y XVIII ha sido utilizada como base para el estudio arqueologico de estos eventos.", "temporalidad": "Colonial", "metodos": "Inspeccion patologica del estado actual de la edificacion\nEvaluacion patologica de vulnerabilidad sismica y efectos del oleaje\nModelado estructural mediante software SAP 2000 V.16.1.1 para evaluar el estado de la estructura y su comportamiento ante cargas sismicas y oleaje\nEncuesta geometrica y de materiales (relevamiento arquitectonico)\nAnalisis de la degradacion del material, fallas estructurales y patrones de grietas\nAnalisis estructural de porciones significativas de la construccion\nInvestigacion de fuentes historicas y cartografia colonial\nSuperposicion y analisis de cartografias historicas del canal de Bocachica\nRegistro preliminar de grafitis historicos en las fortificaciones del canal de Bocachica\nAnalisis de condiciones oceano-atmosfera y variaciones morfologicas de la linea de costa", "entidades": "UNESCO (declaratoria de Patrimonio de la Humanidad, 1984)\nUniversidad de Firenze / Universita degli Studi di Firenze (Italia) - relevamiento arquitectonico y analisis estructural (Paradiso, Galassi, Benedetti)\nUniversidad de Cartagena (investigacion de Berrocal Olave)\nDIMAR / CIOH (Centro de Investigaciones Oceanograficas e Hidrograficas del Caribe)\nUniversidad Externado de Colombia (investigaciones arqueologicas en Bocachica, Del Cairo Hurtado)\nMinisterio de Cultura de Colombia (gestion patrimonial)", "responsables": "Arnoldo Berrocal Olave: autor del estudio tecnico especifico de la Bateria San Jose (2016) y de la evaluacion patologica de vulnerabilidad sismica de San Jose y San Fernando (2018)\nMichele Paradiso, Stefano Galassi y Silvia Benedetti (Universidad de Firenze): realizaron la encuesta geometrica y material del Fuerte San Fernando y del sistema defensivo de Bocachica (2012-2013)\nCarlos Del Cairo Hurtado: investigacion arqueologica del paisaje cultural maritimo y subacuatico del canal de Bocachica, incluyendo la cartografia colonial\nAndrea Amortegui Sanchez: registro de grafitis historicos de las fortificaciones del canal de Bocachica\nManuel Gamez Casado: estudio historico sobre la invasion de arenas en el foso del fuerte de San Fernando\nRamiro Segura Salas: estudio historico de las defensas de la canal de Bocachica", "conservacion": "Inspeccion patologica y propuestas de conservacion: Berrocal Olave (2016) realizo la inspeccion patologica del estado actual de la Bateria de San Jose con el objetivo de localizar los danos y proponer soluciones para la conservacion de los activos patrimoniales de la ciudad\n\nEvaluacion de vulnerabilidad y propuesta de reforzamiento: Berrocal Olave (2018) presento una evaluacion patologica y una propuesta de reforzamiento estructural para la Bateria de San Jose y el Fuerte San Fernando, usando modelado con SAP 2000 para evaluar el comportamiento ante sismos y oleaje\n\nAnalisis de degradacion y necesidad de consolidacion: Paradiso et al. (2013) identificaron la necesidad de intervenciones de consolidacion tras el analisis de degradacion del material y fallas estructurales\n\nProblemas historicos de conservacion: Gamez Casado (2017) documento los proyectos de ingenieros militares espanoles para resolver la invasion de arenas en el foso del fuerte de San Fernando de Bocachica, uno de los principales problemas de conservacion de las fortificaciones\n\nMarco legal: Ley 1675 de 2013 sobre patrimonio cultural sumergido y Declaratoria UNESCO de 1984 como Patrimonio Historico y Cultural de la Humanidad", "bibliografia": "Berrocal Olave, A. (2016). Estudio tecnico: Bateria San Jose de Bocachica en Cartagena de Indias, Colombia.\n\nBerrocal Olave, A. (2018). Evaluacion patologica de la vulnerabilidad sismica y efectos del oleaje en el fuerte-bateria de San Jose y San Fernando de Bocachica.\n\nParadiso, M., Galassi, S., & Benedetti, S. (2013). Una contribucion para conocer el Fuerte San Fernando a defensivo colonial de la plaza fuerte.", "resumen": "La Escollera de Bocagrande es una estructura submarina construida en el siglo XVIII para cerrar el acceso de embarcaciones por la boca de Bocagrande, entre la Isla de Tierrabomba y la Punta de Icacos, en la peninsula del mismo nombre. Ejecutada entre 1769 y 1786, fue encomendada al ingeniero militar Antonio de Arevalo. El muro sumergido tenia aproximadamente 3.600 metros de longitud y cerro la navegacion por Bocagrande de forma permanente desde el siglo XIX hasta la actualidad.\n\nHistoricamente, el estrecho de Bocagrande fue utilizado durante decadas para acceder a la Bahia de Cartagena de Indias, pero en 1640 el paso quedo bloqueado naturalmente, forzando el uso exclusivo de la entrada de Bocachica. Sin embargo, la reapertura natural de Bocagrande un siglo despues hizo necesario desarrollar un proyecto para cerrarlo artificialmente.\n\nAndrade-Amaya et al. (2022) demostraron que la construccion de la Escollera ha significado la acrecion del terreno en las peninsulas de Bocagrande y Castillogrande en cerca de 44,4 hectareas, y que los espolones colocados en la playa en el siglo pasado lo han sostenido.", "temporalidad": "Colonial", "metodos": "Tecnologia acustica multihaz (multibeam acoustic technology) para analizar y caracterizar la estructura submarina en su estado actual\nRegistros historicos escritos y cartograficos\nDatos batimetricos multihaz de alta resolucion del Servicio Hidrografico de la DIMAR\nComparacion de mapas historicos de 1772, 1854, 1935, 1995 y 2021\nReconstruccion de paisajes arqueologicos sumergidos\nAnalisis de condiciones oceano-atmosfera mediante tecnicas modernas de datos espaciales\nAnalisis multitemporal de la evolucion de la linea de costa\nInvestigacion historico-arquitectonica de la infraestructura militar defensiva del siglo XVIII", "entidades": "DIMAR / CIOH (Servicio Hidrografico, Centro de Investigaciones Oceanograficas e Hidrograficas del Caribe) - Richard Guzman-Martinez, D. Quintana-Saavedra, Carlos Alberto Andrade-Amaya\nUniversidad Nacional de Colombia / Universidad de Cadiz - coinvestigadores internacionales\nUniversidad Nacional de Colombia, sede Manizales - Jorge Galindo-Diaz (estudio de fortificaciones)\nUniversitat de Girona (Espana) - Joan Fontas-Serrat", "responsables": "Richard Guzman-Martinez, D. Quintana-Saavedra y Carlos-Alberto Andrade-Amaya: autores del estudio principal publicado en Journal of Maritime Archaeology (2023), donde analizan y caracterizan La Escollera y una estructura sumergida relacionada con el Fuerte San Matias\nCarlos Alberto Andrade-Amaya, Richard Guzman-Martinez y Diana Maria Quintana-Saavedra: autores del estudio sobre el avance de la linea de costa publicado en la Revista de la Academia Colombiana de Ciencias (2022)\nJorge Galindo-Diaz y Joan Fontas-Serrat: estudio de la muralla sumergida como obra del ingeniero militar Antonio de Arevalo, presentado en FORTMED 2026\nWilliam Gomez Pretelt y A.C. Diaz: estudio pionero (2011) sobre la estrategia defensiva y la Escollera de Bocagrande", "conservacion": "Caracterizacion de dimensiones actuales: Guzman-Martinez et al. (2023) estimaron las dimensiones de la estructura en su estado actual y revelaron su relacion con el contexto arqueologico, incluyendo otras estructuras defensivas que protegian la ciudad y la bahia.\n\nDocumentacion del impacto geomorfologico: Andrade-Amaya et al. (2022) documentaron que la Escollera ha generado la acrecion de 44,4 Ha de terreno, lo que implica que la estructura sigue siendo funcional y modificando el paisaje costero. Su preservacion es fundamental para la estabilidad de las peninsulas de Bocagrande y Castillogrande.\n\nPatrimonio de la Humanidad: La Escollera forma parte del sistema defensivo de Cartagena de Indias, declarado Patrimonio de la Humanidad por la UNESCO en 1984.\n\nReconocimiento como patrimonio subacuatico: Los estudios del CIOH han posicionado la Escollera como un bien de patrimonio cultural sumergido que requiere proteccion y gestion.", "bibliografia": "Galindo-Diaz, J., & Fontas-Serrat, J. (2026). The submerged wall of the Bocagrande canal in Cartagena de Indias, a defensive work by the military engineer Antonio de Arevalo (1769-1788). En Proceedings of the International Conference on Fortifications of the Mediterranean Coast FORTMED 2026 (Vol. 24). https://doi.org/10.4995/fortmed2026.2026.21531\n\nGuzman-Martinez, R., Quintana-Saavedra, D., & Andrade-Amaya, C. A. (2023). On the survey of \"La Escollera\" and a submerged structure related to Fort San Matias in the Bay of Cartagena de Indias. Journal of Maritime Archaeology, 18, 491-510. https://doi.org/10.1007/s11457-023-09374-3\n\nAndrade-Amaya, C. A., Guzman-Martinez, R., & Quintana-Saavedra, D. M. (2022). El avance de la linea de costa de las peninsulas de Bocagrande y Castillogrande y la construccion de la Escollera en 1758 en Cartagena de Indias. Revista de la Academia Colombiana de Ciencias Exactas, Fisicas y Naturales, 46(180). https://doi.org/10.18257/raccefyn.1722\n\nGomez Pretelt, W., & Carvajal Diaz, A. (2011). Estrategia para la defensa y ubicacion de las fortificaciones de la plaza fuerte de Cartagena de Indias en el siglo XVIII a partir de condiciones oceano-atmosfera y variaciones morfologicas en la linea de costa. Saber, Ciencia y Libertad, 6(2). https://doi.org/10.18041/2382-3240/SABER.2011V6N2.2506\n\nDelgadillo Garzon, O., & Ramirez, P. (2007). Contexto natural del patrimonio cultural subacuatico en la bahia de Cartagena: perspectivas de estudios interdisciplinarios y potencial de utilizacion.\n\nDel Cairo Hurtado, C. (2015). Paisajes culturales maritimos y subacuaticos. Una propuesta metodologica para la investigacion y proteccion del Patrimonio Cultural Sumergido [Tesis doctoral, Universidad Externado de Colombia].", "color": "#e74c3c"}}]};

const map = L.map('map', { center: [8.5, -76.5], zoom: 6, zoomControl: true });

L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution: 'Tiles © Esri', maxZoom: 18
}).addTo(map);

function getIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:18px;height:18px;background:${color};border:3px solid rgba(255,255,255,0.9);border-radius:50%;box-shadow:0 0 10px ${color}, 0 2px 6px rgba(0,0,0,0.5);cursor:pointer;"></div>`,
    iconSize: [18, 18], iconAnchor: [9, 9]
  });
}

function badgeColor(temp) {
  const c = {
    'Colonial': '#e74c3c', 'Colonial-Republicano': '#2ecc71',
    'Prehispanico-Colonial': '#3498db', 'Prehispánico-Colonial': '#3498db',
    'preventiva': '#1abc9c', 'Preventiva': '#1abc9c',
    'Republicano': '#f39c12', 'Indefinida': '#95a5a6'
  };
  return c[temp] || '#95a5a6';
}

function fullText(text) {
  if (!text || text === 'NULL' || text.trim() === '') return '<em style="color:#999">No disponible</em>';
  return text;
}

geojsonData.features.forEach(function(feature) {
  const p = feature.properties;
  const coords = feature.geometry.coordinates;
  const marker = L.marker([coords[1], coords[0]], {icon: getIcon(p.color)});
  
  const popupContent = `
    <div class="popup-container">
      <div class="popup-header">
        <h3>⚓ ${p.nombre}</h3>
        <span class="popup-badge" style="background:${badgeColor(p.temporalidad)}">${p.temporalidad}</span>
      </div>
      <div class="popup-section" style="border-color:#f1c40f">
        <h4>🎯 Objetivo</h4>
        <p>${fullText(p.objetivo)}</p>
      </div>
      <div class="popup-section">
        <h4>📋 Resumen</h4>
        <p>${fullText(p.resumen)}</p>
      </div>
      <div class="popup-section" style="border-color:#e74c3c">
        <h4>🔬 Métodos utilizados</h4>
        <p>${fullText(p.metodos)}</p>
      </div>
      <div class="popup-section" style="border-color:#2ecc71">
        <h4>🏛️ Entidades participantes</h4>
        <p>${fullText(p.entidades)}</p>
      </div>
      <div class="popup-section" style="border-color:#f39c12">
        <h4>👤 Responsables</h4>
        <p>${fullText(p.responsables)}</p>
      </div>
      <div class="popup-section" style="border-color:#9b59b6">
        <h4>🛡️ Conservación y Preservación</h4>
        <p>${fullText(p.conservacion)}</p>
      </div>
      <div class="popup-section" style="border-color:#95a5a6">
        <h4>📚 Bibliografía</h4>
        <p>${fullText(p.bibliografia)}</p>
      </div>
    </div>
  `;
  
  marker.bindPopup(popupContent, { maxWidth: 400, maxHeight: 520, autoPan: true });
  marker.addTo(map);
});

const bounds = geojsonData.features.map(f => [f.geometry.coordinates[1], f.geometry.coordinates[0]]);
map.fitBounds(bounds, {padding: [60, 60]});
</script>
